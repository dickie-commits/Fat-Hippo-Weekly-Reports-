<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fat Hippo Weekly Site Report</title>
<style>
  :root{ color-scheme: light; }

  :root{
    --bg:#0a0a0a;
    --panel:#161616;
    --panel-alt:#1e1e1e;
    --panel-border:#2b2b2b;
    --mint:#2fe6a6;
    --mint-dim:rgba(47,230,166,0.14);
    --text:#f4f4f4;
    --text-dim:#9c9c9c;
    --red:#ff6161;
    --red-dim:rgba(255,97,97,0.14);
    --amber:#ffb84d;
    --amber-dim:rgba(255,184,77,0.14);
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;padding:0;
    background:var(--bg);
    color:var(--text);
    font-family: "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
    font-size:13px;
    line-height:1.5;
  }

  #app{
    min-height:100vh;
    background:
      radial-gradient(ellipse 900px 300px at 15% -10%, rgba(47,230,166,0.08), transparent 60%),
      var(--bg);
    padding-bottom:60px;
  }

  header{
    display:flex;
    align-items:center;
    gap:18px;
    padding:22px 28px 18px 28px;
    border-bottom:1px solid var(--panel-border);
    flex-wrap:wrap;
  }

  .logo-mark{ flex-shrink:0; }

  .title-block{ flex:1; min-width:260px; }

  h1.brand{
    font-family: Arial, "Helvetica Neue", sans-serif;
    font-weight:900;
    letter-spacing:0.5px;
    font-size:30px;
    margin:0;
    color:#fff;
    text-transform:uppercase;
    text-shadow: 1px 1px 0 rgba(47,230,166,0.35), -1px -1px 0 rgba(255,255,255,0.05);
  }

  .subtitle{
    margin-top:4px;
    color:var(--mint);
    font-size:13px;
    letter-spacing:0.5px;
  }

  .subtitle .muted{ color:var(--text-dim); }

  .status-pill{
    margin-left:auto;
    font-size:11px;
    color:var(--text-dim);
    border:1px solid var(--panel-border);
    border-radius:20px;
    padding:6px 14px;
    background:var(--panel);
    white-space:nowrap;
  }

  .status-pill.live::before{
    content:"";
    display:inline-block;
    width:7px;height:7px;
    border-radius:50%;
    background:var(--mint);
    margin-right:7px;
    box-shadow:0 0 6px var(--mint);
  }

  nav#tabs{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:14px 28px;
    border-bottom:1px solid var(--panel-border);
    background:#0d0d0d;
    scrollbar-width:thin;
  }
  nav#tabs::-webkit-scrollbar{height:6px;}
  nav#tabs::-webkit-scrollbar-thumb{background:var(--panel-border); border-radius:4px;}

  .tab-btn{
    flex-shrink:0;
    background:var(--panel);
    color:var(--text-dim);
    border:1px solid var(--panel-border);
    border-radius:8px;
    padding:8px 16px;
    font-family:inherit;
    font-size:12px;
    letter-spacing:0.4px;
    text-transform:uppercase;
    cursor:pointer;
    transition:all .15s ease;
  }
  .tab-btn:hover{ color:#fff; border-color:var(--mint); }
  .tab-btn.active{
    background:var(--mint-dim);
    color:var(--mint);
    border-color:var(--mint);
    font-weight:700;
  }
  .tab-btn.group-tab{ font-weight:700; }

  main{ padding:26px 28px; }

  .panel{ display:none; animation:fadein .2s ease; }
  .panel.active{ display:block; }
  @keyframes fadein{ from{opacity:0;} to{opacity:1;} }

  .section{
    margin-bottom:30px;
  }

  .section-title{
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:12px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .section-title::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--panel-border);
  }

  .card-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(180px,1fr));
    gap:12px;
  }

  .card{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:10px;
    padding:16px 18px;
  }

  .card .label{
    font-size:10.5px;
    color:var(--text-dim);
    text-transform:uppercase;
    letter-spacing:0.6px;
    margin-bottom:8px;
  }

  .card .value{
    font-size:22px;
    font-weight:700;
    color:#fff;
  }

  .card .value.mint{ color:var(--mint); }
  .card .value.red{ color:var(--red); }
  .card .value.amber{ color:var(--amber); }

  .card .delta{
    margin-top:6px;
    font-size:11.5px;
  }
  .delta.pos{ color:var(--mint); }
  .delta.neg{ color:var(--red); }
  .delta.flat{ color:var(--text-dim); }

  .card .rag-caption{
    margin-top:6px;
    font-size:10.5px;
    color:var(--text-dim);
  }

  .card.rag-good{
    border-color:rgba(47,230,166,0.55);
    background:linear-gradient(180deg, rgba(47,230,166,0.10), var(--panel) 70%);
  }
  .card.rag-good .value{ color:var(--mint); }

  .card.rag-bad{
    border-color:rgba(255,97,97,0.6);
    background:linear-gradient(180deg, rgba(255,97,97,0.10), var(--panel) 70%);
  }
  .card.rag-bad .value{ color:var(--red); }

  .section-subtitle{
    font-size:11px;
    color:var(--text-dim);
    margin:-6px 0 12px 0;
  }

  .review-card{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:10px;
    padding:14px 16px;
    margin-bottom:10px;
  }
  .review-card.negative{
    border-color:rgba(255,97,97,0.55);
    background:linear-gradient(180deg, rgba(255,97,97,0.08), var(--panel) 60%);
  }
  .review-meta{
    font-size:11px;
    color:var(--text-dim);
    margin-bottom:8px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    align-items:center;
  }
  .review-meta b{ color:#fff; }
  .platform-badge{
    display:inline-block;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    padding:2px 8px;
    border-radius:20px;
    background:var(--panel-alt);
    border:1px solid var(--panel-border);
    color:var(--text-dim);
  }
  .stars{ color:var(--amber); letter-spacing:1px; }
  .review-text{ font-size:12.5px; color:#e9e9e9; line-height:1.5; }
  .no-reviews{ color:var(--text-dim); font-style:italic; padding:10px 4px; }

  table.gh{
    width:100%;
    border-collapse:collapse;
    font-size:12px;
  }
  table.gh th{
    text-align:left;
    color:var(--text-dim);
    font-weight:600;
    text-transform:uppercase;
    font-size:10px;
    letter-spacing:0.5px;
    padding:8px 10px;
    border-bottom:1px solid var(--panel-border);
  }
  table.gh td{
    padding:9px 10px;
    border-bottom:1px solid #1c1c1c;
    color:var(--text);
  }
  table.gh tbody tr:hover{ background:#191919; }
  table.gh td.num{ text-align:right; font-variant-numeric:tabular-nums; }

  .info-box{
    background:var(--panel-alt);
    border:1px dashed var(--panel-border);
    border-radius:10px;
    padding:16px 18px;
    display:flex;
    gap:12px;
    align-items:flex-start;
  }
  .info-box .dot{
    flex-shrink:0;
    width:20px;height:20px;
    border-radius:50%;
    background:var(--mint);
    color:#00251a;
    font-weight:900;
    font-size:12px;
    display:flex;align-items:center;justify-content:center;
    margin-top:2px;
  }

  .log-entry{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:10px;
    padding:14px 16px;
    margin-bottom:10px;
  }
  .log-entry .log-meta{
    font-size:11px;
    color:var(--text-dim);
    margin-bottom:8px;
    display:flex;
    gap:14px;
    flex-wrap:wrap;
  }
  .log-entry .log-meta b{ color:var(--mint); }
  .log-field{ margin-bottom:6px; font-size:12.5px; }
  .log-field .fname{ color:var(--text-dim); }

  .no-logs{
    color:var(--text-dim);
    font-style:italic;
    padding:14px 4px;
  }

  .summary-box{
    background:linear-gradient(135deg, rgba(47,230,166,0.07), rgba(47,230,166,0.01));
    border:1px solid var(--mint);
    border-radius:10px;
    padding:18px 20px;
    font-size:13px;
    line-height:1.7;
    color:#e9e9e9;
  }
  .summary-box b{ color:var(--mint); }

  .loading{
    padding:80px 20px;
    text-align:center;
    color:var(--text-dim);
  }
  .loading .spinner{
    width:28px;height:28px;
    border-radius:50%;
    border:3px solid var(--panel-border);
    border-top-color:var(--mint);
    margin:0 auto 16px auto;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .err-banner{
    background:var(--red-dim);
    border:1px solid var(--red);
    color:#ffb3b3;
    padding:10px 14px;
    border-radius:8px;
    font-size:12px;
    margin-bottom:18px;
  }

  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-thumb{ background:#2b2b2b; border-radius:4px; }
</style>
</head>

    return sign + CCY + Math.abs(n).toLocaleString('en-GB',{minimumFractionDigits:0, maximumFractionDigits:0});
  };
  const fmtPct = (n, dp=1) => (n===null||n===undefined||isNaN(n)) ? 'n/a' : (n>=0?'':'') + n.toFixed(dp) + '%';
  const fmtSignedPct = (n, dp=1) => {
    if (n===null||n===undefined||isNaN(n)) return 'n/a';
    return (n>0?'+':'') + n.toFixed(dp) + '%';
  };

  function deltaClass(n, invert){
    if (n===null||n===undefined||isNaN(n)) return 'flat';
    if (invert) n = -n;
    if (n > 0.4) return 'pos';
    if (n < -0.4) return 'neg';

  }

  function extractRow(row, metricKey){
    let location=null, discountType=null, housePart=null;
    for (const k of Object.keys(row)){
      if (k===metricKey) continue;
      const lk = k.toLowerCase();
      if (lk.includes('housepart')) housePart = row[k];
      else if (lk.includes('discount')) discountType = row[k];
      else if (lk.includes('location')) location = row[k];
    }
    return { location, discountType, housePart, value: Number(row[metricKey])||0 };
  }

  function sumByLocation(rows, metricKey){
    const out = {};
    for (const r of rows){
      const {location, value} = extractRow(r, metricKey);
      if (!location) continue;
      out[location] = (out[location]||0) + value;
    }
    return out;
  }

  async function loadDashboard(){
    const errors = [];
    const statusPill = document.getElementById('status-pill');
    const content = document.getElementById('content');
    const tabsEl = document.getElementById('tabs');

    CCY = CCY_SYMBOLS[CCY_CODE] || (CCY_CODE+' ');

    // Fixed week ranges for this snapshot (computed once, at export time) — do not move with the calendar.
    const lastWeekMonday = parseISO('2026-07-06');
    const lastWeekSunday = parseISO('2026-07-12');
    const reviewMonthStart = parseISO('2026-06-01');
    const reviewMonthPriorStart = parseISO('2026-05-01');

    const RANGE = {
      last:  { s: '2026-07-06', e: '2026-07-12' },
      prior: { s: '2026-06-29', e: '2026-07-05' },
      ly:    { s: '2025-07-07', e: '2025-07-13' },
      currentWeek: { s: '2026-07-13', e: '2026-07-19' },
      nextWeek:     { s: '2026-07-20', e: '2026-07-26' },
      reviewMonth:      { s: '2026-06-01', e: '2026-06-30' },
      reviewMonthPrior: { s: '2026-05-01', e: '2026-05-31' }
    };
    const reviewMonthLabel = reviewMonthStart.toLocaleDateString('en-GB', {month:'short', year:'numeric', timeZone:'UTC'});
    const reviewMonthPriorLabel = reviewMonthPriorStart.toLocaleDateString('en-GB', {month:'short', year:'numeric', timeZone:'UTC'});

    document.getElementById('week-subtitle').innerHTML =
      'Week commencing <b>'+fmtHuman(lastWeekMonday)+'</b> &mdash; <span class="muted">'+fmtHuman(lastWeekMonday)+' to '+fmtHuman(lastWeekSunday)+'</span> &middot; static snapshot generated '+fmtHuman(parseISO(SNAPSHOT_GENERATED));

    const locsRes = { results: RAW_LOCATIONS.map(name => ({name})) };
    const salesLast = { data: RAW_SALES_LAST };
    const salesPrior = { data: RAW_SALES_PRIOR };
    const salesLY = { data: RAW_SALES_LY };
    const forecastLast = { data: RAW_FORECAST_LAST };
    const laborLast = { data: RAW_LABOR_LAST };
    const plannedLaborLast = { data: RAW_PLANNED_LABOR_LAST };
    const laborByHousePart = { data: RAW_LABOR_BY_HOUSEPART };
    const discountsLast = { data: RAW_DISCOUNTS_LAST };
    const discountsByType = { data: RAW_DISCOUNTS_BY_TYPE };
    const wastageLast = { data: RAW_WASTAGE_LAST };
    const logsRes = { results: [] }; // no Weekly Site Report / EOD logs were submitted anywhere for w/c 6 Jul 2026 at export time
    const forecastCurrentWeek = { data: RAW_FORECAST_CW };
    const plannedLaborCurrentWeek = { data: RAW_PLANNED_LABOR_CW };
    const forecastNextWeek = { data: RAW_FORECAST_NW };
    const plannedLaborNextWeek = { data: RAW_PLANNED_LABOR_NW };
    const avgRatingThisMonth = { data: RAW_AVG_RATING_THIS_MONTH };
    const numReviewsThisMonth = { data: RAW_NUM_REVIEWS_THIS_MONTH };
    const avgRatingPriorMonth = { data: RAW_AVG_RATING_PRIOR_MONTH };
    const numReviewsPriorMonth = { data: RAW_NUM_REVIEWS_PRIOR_MONTH };
    const lastWeekReviews = RAW_LAST_WEEK_REVIEWS;

    const siteNames = (locsRes.results||[]).map(l=>l.name).sort();

    const mSalesLast   = sumByLocation(salesLast.data||[], 'sales');
    const mSalesPrior  = sumByLocation(salesPrior.data||[], 'sales');
    const mSalesLY     = sumByLocation(salesLY.data||[], 'sales');
    const mForecast    = sumByLocation(forecastLast.data||[], 'forecast_sales');
    const mLabor       = sumByLocation(laborLast.data||[], 'labor_cost');
    const mPlannedLab  = sumByLocation(plannedLaborLast.data||[], 'planned_labor_cost');
    const mDiscounts   = sumByLocation(discountsLast.data||[], 'discounts');
    const mWastage     = sumByLocation(wastageLast.data||[], 'wastage');
    const mForecastCW  = sumByLocation(forecastCurrentWeek.data||[], 'forecast_sales');
    const mPlannedLabCW = sumByLocation(plannedLaborCurrentWeek.data||[], 'planned_labor_cost');
    const mForecastNW  = sumByLocation(forecastNextWeek.data||[], 'forecast_sales');
    const mPlannedLabNW = sumByLocation(plannedLaborNextWeek.data||[], 'planned_labor_cost');

    // house part split: {site: {FOH,BOH,Other}}
    const houseSplit = {};
    for (const r of (laborByHousePart.data||[])){
      const {location, housePart, value} = extractRow(r, 'labor_cost');
      if (!location) continue;
      houseSplit[location] = houseSplit[location] || {FOH:0, BOH:0, Other:0};
      const hp = (housePart||'').toUpperCase();
      if (hp==='FOH') houseSplit[location].FOH += value;
      else if (hp==='BOH') houseSplit[location].BOH += value;
      else houseSplit[location].Other += value;
    }

    // discount breakdown: {site: {discount:x, comp:y, types:[{name,value}]}}
    const discountSplit = {};
    for (const r of (discountsByType.data||[])){
      const {location, discountType, value} = extractRow(r, 'discounts');
      if (!location) continue;
      discountSplit[location] = discountSplit[location] || {discount:0, comp:0, types:{}};
      const bucket = classifyDiscount(discountType);
      discountSplit[location][bucket] += value;
      discountSplit[location].types[discountType||'Other'] = (discountSplit[location].types[discountType||'Other']||0) + value;
    }

    // logs grouped by site
    const logsBySite = {};
    for (const l of (logsRes.results||[])){
      const site = l.location_name || 'Unknown';
      logsBySite[site] = logsBySite[site] || [];
      logsBySite[site].push(l);
    }

    // reviews: monthly score map {site: {Google:{avg,count}, TripAdvisor:{avg,count}}}
    function buildReviewScoreMap(avgData, countData){
      const countMap = {};
      for (const r of countData){
        let loc=null, src=null;
        for (const k of Object.keys(r)){
          if (k==='num_reviews') continue;
          if (k.toLowerCase().includes('location')) loc = r[k];
          else if (k==='source_id') src = r[k];
        }
        if (!loc) continue;
        countMap[loc+'|'+normSource(src)] = r.num_reviews;
      }
      const out = {};
      for (const r of avgData){
        let loc=null, src=null;
        for (const k of Object.keys(r)){
          if (k==='avg_rating') continue;
          if (k.toLowerCase().includes('location')) loc = r[k];
          else if (k==='source_id') src = r[k];
        }
        if (!loc) continue;
        const platform = normSource(src);
        out[loc] = out[loc] || {};
        out[loc][platform] = { avg: r.avg_rating, count: countMap[loc+'|'+platform] || 0 };
      }
      return out;
    }
    const scoreThisMonth = buildReviewScoreMap(avgRatingThisMonth.data||[], numReviewsThisMonth.data||[]);
    const scorePriorMonth = buildReviewScoreMap(avgRatingPriorMonth.data||[], numReviewsPriorMonth.data||[]);

    // negative reviews (<=3 stars, with real text) from last week, grouped by site
    const negativeBySite = {};
    for (const r of lastWeekReviews){
      const txt = (r.text||'').trim();
      if (!txt || txt.toLowerCase()==='no text for this review') continue;
      if ((r.rating||5) > 3) continue;
      const site = r.location_name || 'Unknown';
      negativeBySite[site] = negativeBySite[site] || [];
      negativeBySite[site].push({ platform: normSource(r.source), name: r.name, rating: r.rating, text: txt, date: r.review_datetime });
    }
    for (const site in negativeBySite){ negativeBySite[site].sort((a,b)=> (a.date<b.date?1:-1)); }

    function platformScore(name, platform, map){
      const e = (map[name]||{})[platform];
      return e || null;
    }

    function buildSiteReviews(name){
      const out = {};
      ['Google','TripAdvisor'].forEach(p => {
        const cur = platformScore(name, p, scoreThisMonth);
        const prev = platformScore(name, p, scorePriorMonth);
        const trend = (cur && cur.avg!=null && prev && prev.avg) ? ((cur.avg-prev.avg)/prev.avg*100) : null;
        out[p] = { avg: cur?cur.avg:null, count: cur?cur.count:0, trend };
      });
      out.negative = (negativeBySite[name]||[]).slice(0, 8);
      return out;
    }

    function buildSite(name){
      const sales = mSalesLast[name] ?? null;
      const forecast = mForecast[name] ?? null;
      const prior = mSalesPrior[name] ?? null;
      const ly = mSalesLY[name] ?? null;
      const labor = mLabor[name] ?? null;
      const plannedLabor = mPlannedLab[name] ?? null;
      const wastage = mWastage[name] ?? null;
      const discounts = mDiscounts[name] ?? null;
      const hs = houseSplit[name] || {FOH:0,BOH:0,Other:0};
      const ds = discountSplit[name] || {discount:0, comp:0, types:{}};
      const target = LABOUR_TARGETS[name] ?? null;
      const halfTarget = target!=null ? target/2 : null;

      const fcCW = mForecastCW[name] ?? null;
      const plCW = mPlannedLabCW[name] ?? null;
      const fcNW = mForecastNW[name] ?? null;
      const plNW = mPlannedLabNW[name] ?? null;

      return {
        name,
        sales, forecast, prior, ly, labor, plannedLabor, wastage, discounts,
        target, halfTarget,
        vsForecastPct: (sales!=null && forecast) ? ((sales-forecast)/forecast*100) : null,
        vsPriorPct: (sales!=null && prior) ? ((sales-prior)/prior*100) : null,
        vsLYPct: (sales!=null && ly) ? ((sales-ly)/ly*100) : null,
        actualLaborPct: (labor!=null && sales) ? (labor/sales*100) : null,
        forecastLaborPct: (plannedLabor!=null && forecast) ? (plannedLabor/forecast*100) : null,
        fohPct: (sales) ? (hs.FOH/sales*100) : null,
        bohPct: (sales) ? (hs.BOH/sales*100) : null,
        otherPct: (sales && hs.Other) ? (hs.Other/sales*100) : 0,
        wastagePct: (wastage!=null && sales) ? (wastage/sales*100) : null,
        discountPct: (discounts!=null && sales) ? (discounts/sales*100) : null,
        discountSplit: ds,
        logs: logsBySite[name] || [],
        currentWeek: {
          plannedLabor: plCW, forecast: fcCW,
          plannedLaborPct: (plCW!=null && fcCW) ? (plCW/fcCW*100) : null
        },
        nextWeek: {
          plannedLabor: plNW, forecast: fcNW,
          plannedLaborPct: (plNW!=null && fcNW) ? (plNW/fcNW*100) : null
        },
        reviews: buildSiteReviews(name)
      };
    }

    const sites = siteNames.map(buildSite);

    function sumOrNull(arr){
      const vals = arr.filter(v=>v!=null);
      if (!vals.length) return null;
      return vals.reduce((a,b)=>a+b,0);
    }

    const groupSales = sumOrNull(sites.map(s=>s.sales));
    const groupForecast = sumOrNull(sites.map(s=>s.forecast));
    const groupPrior = sumOrNull(sites.map(s=>s.prior));
    const groupLY = sumOrNull(sites.map(s=>s.ly));
    const groupLabor = sumOrNull(sites.map(s=>s.labor));
    const groupPlannedLabor = sumOrNull(sites.map(s=>s.plannedLabor));
    const groupWastage = sumOrNull(sites.map(s=>s.wastage));
    const groupDiscounts = sumOrNull(sites.map(s=>s.discounts));
    const groupFOH = sumOrNull(sites.map(s=> (houseSplit[s.name]||{}).FOH ?? null));
    const groupBOH = sumOrNull(sites.map(s=> (houseSplit[s.name]||{}).BOH ?? null));
    const groupOther = sumOrNull(sites.map(s=> (houseSplit[s.name]||{}).Other ?? null));
    const groupDiscountTypeD = sumOrNull(sites.map(s=>s.discountSplit.discount));
    const groupDiscountTypeC = sumOrNull(sites.map(s=>s.discountSplit.comp));
    const groupPlannedLaborCW = sumOrNull(sites.map(s=>s.currentWeek.plannedLabor));
    const groupForecastCW = sumOrNull(sites.map(s=>s.currentWeek.forecast));
    const groupPlannedLaborNW = sumOrNull(sites.map(s=>s.nextWeek.plannedLabor));
    const groupForecastNW = sumOrNull(sites.map(s=>s.nextWeek.forecast));

    function weightedPlatform(platform){
      let sumRC=0, sumC=0;
      for (const s of sites){
        const e = s.reviews[platform];
        if (e && e.count){ sumRC += e.avg*e.count; sumC += e.count; }
      }
      return sumC ? {avg:sumRC/sumC, count:sumC} : {avg:null, count:0};
    }
    function weightedPlatformPrior(platform){
      let sumRC=0, sumC=0;
      for (const name of siteNames){
        const e = platformScore(name, platform, scorePriorMonth);
        if (e && e.count){ sumRC += e.avg*e.count; sumC += e.count; }
      }
      return sumC ? {avg:sumRC/sumC, count:sumC} : {avg:null, count:0};
    }
    const groupReviews = {};
    ['Google','TripAdvisor'].forEach(p => {
      const cur = weightedPlatform(p);
      const prev = weightedPlatformPrior(p);
      const trend = (cur.avg!=null && prev.avg) ? ((cur.avg-prev.avg)/prev.avg*100) : null;
      groupReviews[p] = { avg: cur.avg, count: cur.count, trend };
    });
    groupReviews.negative = sites.flatMap(s => (s.reviews.negative||[]).map(r => Object.assign({site:s.name}, r)))
      .sort((a,b)=> (a.date<b.date?1:-1)).slice(0, 12);

    const group = {
      name: 'Group',
      sales: groupSales, forecast: groupForecast, prior: groupPrior, ly: groupLY,
      labor: groupLabor, plannedLabor: groupPlannedLabor, wastage: groupWastage, discounts: groupDiscounts,
      target: null, halfTarget: null,
      vsForecastPct: (groupSales!=null && groupForecast) ? ((groupSales-groupForecast)/groupForecast*100) : null,
      vsPriorPct: (groupSales!=null && groupPrior) ? ((groupSales-groupPrior)/groupPrior*100) : null,
      vsLYPct: (groupSales!=null && groupLY) ? ((groupSales-groupLY)/groupLY*100) : null,
      actualLaborPct: (groupLabor!=null && groupSales) ? (groupLabor/groupSales*100) : null,
      forecastLaborPct: (groupPlannedLabor!=null && groupForecast) ? (groupPlannedLabor/groupForecast*100) : null,
      fohPct: (groupSales && groupFOH!=null) ? (groupFOH/groupSales*100) : null,
      bohPct: (groupSales && groupBOH!=null) ? (groupBOH/groupSales*100) : null,
      otherPct: (groupSales && groupOther) ? (groupOther/groupSales*100) : 0,
      wastagePct: (groupWastage!=null && groupSales) ? (groupWastage/groupSales*100) : null,
      discountPct: (groupDiscounts!=null && groupSales) ? (groupDiscounts/groupSales*100) : null,
      discountSplit: { discount: groupDiscountTypeD||0, comp: groupDiscountTypeC||0, types: {} },
      logs: (logsRes.results||[]),
      currentWeek: {
        plannedLabor: groupPlannedLaborCW, forecast: groupForecastCW,
        plannedLaborPct: (groupPlannedLaborCW!=null && groupForecastCW) ? (groupPlannedLaborCW/groupForecastCW*100) : null
      },
      nextWeek: {
        plannedLabor: groupPlannedLaborNW, forecast: groupForecastNW,
        plannedLaborPct: (groupPlannedLaborNW!=null && groupForecastNW) ? (groupPlannedLaborNW/groupForecastNW*100) : null
      },
      reviews: groupReviews,
      isGroup: true,
      siteRows: sites
    };

    RANGE.reviewMonthLabel = reviewMonthLabel;
    RANGE.reviewMonthPriorLabel = reviewMonthPriorLabel;

    statusPill.textContent = 'Static snapshot · generated ' + SNAPSHOT_GENERATED;

    // ---------------- render ----------------
    const allTabs = [group, ...sites];
    tabsEl.innerHTML = '';
    allTabs.forEach((t, i) => {
      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (t.isGroup ? ' group-tab' : '') + (i===0 ? ' active' : '');
      btn.textContent = t.isGroup ? 'Group' : t.name;
      btn.dataset.idx = i;
      btn.addEventListener('click', () => activateTab(i));
      tabsEl.appendChild(btn);
    });

    content.innerHTML = '';
    if (errors.length){
      const banner = document.createElement('div');
      banner.className = 'err-banner';
      banner.textContent = 'Some data could not be loaded: ' + errors.join(' | ');
      content.appendChild(banner);
    }
    allTabs.forEach((t, i) => {
      const panel = document.createElement('div');
      panel.className = 'panel' + (i===0 ? ' active' : '');
      panel.id = 'panel-'+i;
      panel.innerHTML = renderPanel(t, RANGE, CCY);
      content.appendChild(panel);
    });

    // group summary table + per-site lazy tables (discount breakdown)
    renderGroupTable(group, sites);
    initTablesFor(0, group, sites);

    function activateTab(i){
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', Number(b.dataset.idx)===i));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-'+i).classList.add('active');
      initTablesFor(i, group, sites);
    }
  }

  function pctCard(label, value, opts){
    opts = opts||{};
    const cls = value==null ? '' : (opts.invert ? deltaClass(-value) : deltaClass(value));
    const colorCls = value==null ? '' : (cls==='pos'?'mint':cls==='neg'?'red':'');
    return '<div class="card"><div class="label">'+label+'</div><div class="value '+colorCls+'">'+fmtSignedPct(value)+'</div></div>';
  }

  function ragCard(label, valueStr, ragCls, caption){
    return '<div class="card '+ragCls+'"><div class="label">'+label+'</div><div class="value">'+valueStr+'</div>'
      + (caption ? '<div class="rag-caption">'+caption+'</div>' : '') + '</div>';
  }

  function renderPanel(t, RANGE, ccy){
    const isGroup = !!t.isGroup;
    const fVsForecast = deltaClass(t.vsForecastPct);
    const fVsPrior = deltaClass(t.vsPriorPct);
    const fVsLY = deltaClass(t.vsLYPct);

    let html = '';

    html += '<div class="section"><div class="section-title">Revenue &mdash; last week ('+RANGE.last.s+' to '+RANGE.last.e+')</div>';
    html += '<div class="card-grid">';
    html += '<div class="card"><div class="label">Forecasted Revenue</div><div class="value">'+fmtMoney(t.forecast)+'</div></div>';
    html += '<div class="card"><div class="label">Actual Revenue</div><div class="value mint">'+fmtMoney(t.sales)+'</div></div>';
    html += cardWithDelta('vs Forecast', t.vsForecastPct, fVsForecast);
    html += cardWithDelta('vs Prior Week', t.vsPriorPct, fVsPrior);
    html += cardWithDelta('vs Same Week LY', t.vsLYPct, fVsLY);
    html += '</div></div>';

    // ---- Labour — Last Week (actual, RAG vs target) ----
    html += '<div class="section"><div class="section-title">Labour &mdash; Last Week</div>';
    html += '<div class="card-grid">';
    html += ragCard('Forecasted Labour %', fmtPct(t.forecastLaborPct), '', t.target!=null?('Target &le;'+t.target+'%'):'');
    html += ragCard('Actual Labour %', fmtPct(t.actualLaborPct), ragClass(t.actualLaborPct, t.target), t.target!=null?('Target &le;'+t.target+'%'):'');
    html += ragCard('FOH Labour %', fmtPct(t.fohPct), ragClass(t.fohPct, t.halfTarget), t.halfTarget!=null?('Target &le;'+t.halfTarget.toFixed(1)+'%'):'');
    html += ragCard('BOH Labour %', fmtPct(t.bohPct), ragClass(t.bohPct, t.halfTarget), t.halfTarget!=null?('Target &le;'+t.halfTarget.toFixed(1)+'%'):'');
    html += '</div></div>';

    // ---- Current Week — Planned ----
    html += '<div class="section"><div class="section-title">Current Week &mdash; Planned ('+RANGE.currentWeek.s+' to '+RANGE.currentWeek.e+')</div>';
    html += '<div class="card-grid">';
    html += '<div class="card"><div class="label">Planned Labour Cost</div><div class="value">'+fmtMoney(t.currentWeek.plannedLabor)+'</div></div>';
    html += '<div class="card"><div class="label">Forecasted Sales</div><div class="value">'+fmtMoney(t.currentWeek.forecast)+'</div></div>';
    html += ragCard('Planned Labour % of Sales', fmtPct(t.currentWeek.plannedLaborPct), ragClass(t.currentWeek.plannedLaborPct, t.target), t.target!=null?('Target &le;'+t.target+'%'):'');
    html += '</div></div>';

    // ---- Next Week — Planned ----
    html += '<div class="section"><div class="section-title">Next Week &mdash; Planned ('+RANGE.nextWeek.s+' to '+RANGE.nextWeek.e+')</div>';
    html += '<div class="card-grid">';
    html += '<div class="card"><div class="label">Planned Labour Cost</div><div class="value">'+fmtMoney(t.nextWeek.plannedLabor)+'</div></div>';
    html += '<div class="card"><div class="label">Forecasted Sales</div><div class="value">'+fmtMoney(t.nextWeek.forecast)+'</div></div>';
    html += ragCard('Planned Labour % of Sales', fmtPct(t.nextWeek.plannedLaborPct), ragClass(t.nextWeek.plannedLaborPct, t.target), t.target!=null?('Target &le;'+t.target+'%'):'');
    html += '</div></div>';

    html += '<div class="section"><div class="section-title">Discounts &amp; Comps</div>';
    html += '<div class="card-grid">';
    html += '<div class="card"><div class="label">Total Discounts &amp; Comps</div><div class="value amber">'+fmtMoney(t.discounts)+'</div></div>';
    html += '<div class="card"><div class="label">of which Discounts</div><div class="value">'+fmtMoney(t.discountSplit.discount)+'</div></div>';
    html += '<div class="card"><div class="label">of which Comps/Complaints</div><div class="value">'+fmtMoney(t.discountSplit.comp)+'</div></div>';
    html += '<div class="card"><div class="label">% of Revenue</div><div class="value">'+fmtPct(t.discountPct)+'</div></div>';
    html += '</div>';
    if (!isGroup && t.discountSplit.types && Object.keys(t.discountSplit.types).length){
      html += '<div style="margin-top:12px;" id="discount-table-'+safeId(t.name)+'"></div>';
    }
    html += '</div>';

    html += '<div class="section"><div class="section-title">Wastage</div><div class="card-grid">';
    html += '<div class="card"><div class="label">Total Wastage</div><div class="value red">'+fmtMoney(t.wastage)+'</div></div>';
    html += '<div class="card"><div class="label">Wastage % of Revenue</div><div class="value">'+fmtPct(t.wastagePct)+'</div></div>';
    html += '</div></div>';

    // ---- Reviews ----
    html += '<div class="section"><div class="section-title">Reviews &mdash; Google &amp; TripAdvisor</div>';
    html += '<div class="section-subtitle">Monthly score: '+RANGE.reviewMonthLabel+' vs '+RANGE.reviewMonthPriorLabel+'</div>';
    html += '<div class="card-grid">';
    ['Google','TripAdvisor'].forEach(p => {
      const rv = t.reviews[p] || {avg:null,count:0,trend:null};
      const trendCls = rv.trend==null ? 'flat' : (rv.trend>0?'pos':(rv.trend<0?'neg':'flat'));
      html += '<div class="card"><div class="label">'+p+' &mdash; Monthly Score</div><div class="value">'+fmtRating(rv.avg)+'</div>'
        + '<div class="delta '+trendCls+'">'+(rv.trend==null?'No prior-month data':fmtSignedPct(rv.trend)+' vs '+RANGE.reviewMonthPriorLabel)+' &middot; '+rv.count+' review'+(rv.count===1?'':'s')+'</div></div>';
    });
    html += '</div>';
    html += '<div style="margin-top:16px;">';
    html += '<div class="section-title" style="font-size:10px;">Negative Reviews (&le;3&#9733;) &mdash; week of '+RANGE.last.s+'</div>';
    const neg = t.reviews.negative || [];
    if (neg.length){
      for (const r of neg){
        html += '<div class="review-card negative"><div class="review-meta">'
          + '<span class="platform-badge">'+r.platform+'</span>'
          + (isGroup && r.site ? '<b>'+r.site+'</b>' : '')
          + '<span class="stars">'+fmtStars(r.rating)+'</span>'
          + '<span>'+(r.name||'Guest')+'</span>'
          + '<span>'+(r.date? String(r.date).slice(0,10) : '')+'</span>'
          + '</div><div class="review-text">'+escapeHtml(r.text)+'</div></div>';
      }
    } else {
      html += '<div class="no-reviews">No negative reviews (3&#9733; or below) with comments were logged '+(isGroup?'across any site':'for this site')+' this week.</div>';
    }
    html += '</div></div>';

    html += '<div class="section"><div class="section-title">Log Reports &mdash; week of '+RANGE.last.s+'</div>';
    if (t.logs && t.logs.length){
      for (const l of t.logs){
        html += '<div class="log-entry"><div class="log-meta"><span><b>'+ (l.location_name||'') +'</b></span><span>'+ (l.logbook_name||'Log') +'</span><span>'+ (l.date_of_business||'') +'</span><span>'+ (l.author||'') +'</span></div>';
        const sections = (l.full_text && l.full_text.full_text) || [];
        for (const sec of sections){
          for (const f of (sec.section_content||[])){
            if (!f.field_value) continue;
            html += '<div class="log-field"><span class="fname">'+f.field_name+':</span> '+escapeHtml(String(f.field_value))+'</div>';
          }
        }
      }
    } else {
      html += '<div class="no-logs">No log reports were submitted '+(isGroup? 'by any site' : 'for this site')+' during this week. Flag with the GM to ensure the Weekly Site Report is logged going forward.</div>';
    }
    html += '</div>';

    html += '<div class="section"><div class="section-title">Summary &amp; Where Staff Need To Focus</div>';
    html += '<div class="summary-box">'+buildSummary(t)+'</div></div>';

    if (isGroup){
      html += '<div class="section"><div class="section-title">All Sites &mdash; Last Week Overview</div><div id="group-table"></div></div>';
    }

    return html;
  }

  function cardWithDelta(label, value, cls){
    const colorCls = cls==='pos'?'mint':cls==='neg'?'red':'';
    return '<div class="card"><div class="label">'+label+'</div><div class="value '+colorCls+'">'+fmtSignedPct(value)+'</div></div>';
  }

  function safeId(s){ return String(s).replace(/[^a-z0-9]/gi,'_'); }
  function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function buildSummary(t){
    const parts = [];
    const nm = t.isGroup ? 'Across the group' : t.name;

    if (t.vsForecastPct!=null){
      if (t.vsForecastPct >= 2) parts.push(nm+' beat forecast by <b>'+fmtSignedPct(t.vsForecastPct)+'</b> ('+fmtMoney(t.sales)+' vs '+fmtMoney(t.forecast)+' forecast).');
      else if (t.vsForecastPct <= -2) parts.push(nm+' missed forecast by <b>'+fmtSignedPct(t.vsForecastPct)+'</b> ('+fmtMoney(t.sales)+' vs '+fmtMoney(t.forecast)+' forecast) &mdash; worth reviewing what drove the shortfall.');
      else parts.push(nm+' landed close to forecast ('+fmtMoney(t.sales)+' vs '+fmtMoney(t.forecast)+').');
    }
    if (t.vsPriorPct!=null && t.vsLYPct!=null){
      const trendWord = t.vsPriorPct >=0 ? 'up' : 'down';
      const lyWord = t.vsLYPct >=0 ? 'up' : 'down';
      parts.push('Sales were '+trendWord+' '+fmtPct(Math.abs(t.vsPriorPct))+' on the prior week and '+lyWord+' '+fmtPct(Math.abs(t.vsLYPct))+' versus the same week last year.');
    } else if (t.vsPriorPct!=null){
      parts.push('Sales were '+(t.vsPriorPct>=0?'up':'down')+' '+fmtPct(Math.abs(t.vsPriorPct))+' on the prior week.');
    }

    if (t.actualLaborPct!=null && t.target!=null){
      const diff = t.actualLaborPct - t.target;
      if (diff > 0.3) parts.push('Labour ran <b>'+diff.toFixed(1)+'pts above the '+t.target+'% target</b> ('+fmtPct(t.actualLaborPct)+' actual) &mdash; '+(t.fohPct>t.bohPct? 'FOH':'BOH')+' carried the larger share ('+fmtPct(t.fohPct)+' FOH / '+fmtPct(t.bohPct)+' BOH) and rotas should be tightened against trade next week.');
      else parts.push('Labour stayed at or under the '+t.target+'% target at '+fmtPct(t.actualLaborPct)+' ('+fmtPct(t.fohPct)+' FOH / '+fmtPct(t.bohPct)+' BOH).');
    } else if (t.actualLaborPct!=null && t.forecastLaborPct!=null){
      const diff = t.actualLaborPct - t.forecastLaborPct;
      if (diff > 0.5) parts.push('Labour ran <b>'+diff.toFixed(1)+'pts over plan</b> ('+fmtPct(t.actualLaborPct)+' actual vs '+fmtPct(t.forecastLaborPct)+' forecast) &mdash; '+(t.fohPct>t.bohPct? 'FOH':'BOH')+' carried the larger share ('+fmtPct(t.fohPct)+' FOH / '+fmtPct(t.bohPct)+' BOH) and rotas should be tightened against trade next week.');
      else if (diff < -0.5) parts.push('Labour ran under plan ('+fmtPct(t.actualLaborPct)+' actual vs '+fmtPct(t.forecastLaborPct)+' forecast), split '+fmtPct(t.fohPct)+' FOH / '+fmtPct(t.bohPct)+' BOH.');
      else parts.push('Labour ran to plan at '+fmtPct(t.actualLaborPct)+' ('+fmtPct(t.fohPct)+' FOH / '+fmtPct(t.bohPct)+' BOH).');
    }

    if (t.nextWeek && t.nextWeek.plannedLaborPct!=null && t.target!=null && t.nextWeek.plannedLaborPct > t.target + 0.3){
      parts.push('Next week\'s rota is currently planned <b>'+(t.nextWeek.plannedLaborPct-t.target).toFixed(1)+'pts above target</b> ('+fmtPct(t.nextWeek.plannedLaborPct)+' planned) &mdash; worth trimming hours against the forecast before the week starts.');
    }

    if (t.discountPct!=null){
      if (t.discountPct > 1.5) parts.push('Discounts &amp; comps reached <b>'+fmtPct(t.discountPct)+'</b> of revenue ('+fmtMoney(t.discounts)+') &mdash; managers should review the drivers, particularly complaint-led comps, with the team.');
      else parts.push('Discounts &amp; comps stayed contained at '+fmtPct(t.discountPct)+' of revenue.');
    }

    if (t.wastagePct!=null){
      if (t.wastagePct > 0.6) parts.push('Wastage was elevated at <b>'+fmtPct(t.wastagePct)+'</b> of revenue ('+fmtMoney(t.wastage)+') &mdash; a focus area for kitchen prep and stock control next week.');
      else parts.push('Wastage was under control at '+fmtPct(t.wastagePct)+' of revenue ('+fmtMoney(t.wastage)+').');
    }

    if (t.reviews){
      const negCount = (t.reviews.negative||[]).length;
      if (negCount > 0){
        parts.push('<b>'+negCount+' negative review'+(negCount===1?'':'s')+' (3&#9733; or below)</b> came in this week &mdash; worth a manager follow-up on the specific complaints raised.');
      }
      const g = t.reviews.Google, tr = t.reviews.TripAdvisor;
      if (g && g.trend!=null && g.trend <= -3) parts.push('Google score is trending down '+fmtPct(Math.abs(g.trend))+' month-on-month.');
      if (tr && tr.trend!=null && tr.trend <= -3) parts.push('TripAdvisor score is trending down '+fmtPct(Math.abs(tr.trend))+' month-on-month.');
    }

    if (!t.logs || !t.logs.length){
      parts.push((t.isGroup ? 'No sites logged a Weekly Site Report' : 'No Weekly Site Report was logged') +' this week &mdash; chase submission so revenue, labour and waste explanations are captured going forward.');
    }

    return parts.join(' ');
  }

  function renderGroupTable(group, sites){
    const el = document.getElementById('group-table');
    if (!el || !window.gridjs) return;
    const rows = sites.map(s => [
      s.name,
      fmtMoney(s.sales), fmtMoney(s.forecast),
      fmtSignedPct(s.vsForecastPct), fmtSignedPct(s.vsPriorPct), fmtSignedPct(s.vsLYPct),
      fmtPct(s.actualLaborPct) + (s.target!=null ? (s.actualLaborPct<=s.target? ' ✓':' ⚑') : ''),
      fmtPct(s.currentWeek.plannedLaborPct), fmtPct(s.nextWeek.plannedLaborPct),
      fmtPct(s.wastagePct)
    ]);
    new gridjs.Grid({
      columns: ['Site','Actual Rev','Forecast Rev','vs Forecast','vs Prior Wk','vs LY','Labour % (Actual)','This Wk Labour % (Plan)','Next Wk Labour % (Plan)','Wastage %'],
      data: rows,
      sort:true,
      search:true,
      className: { table:'gh-grid' },
      style: {
        table: { 'font-family':'inherit', 'font-size':'12px', background:'#161616', color:'#f4f4f4' },
        th: { background:'#1e1e1e', color:'#9c9c9c', 'border':'1px solid #2b2b2b' },
        td: { background:'#161616', 'border':'1px solid #1c1c1c' }
      }
    }).render(el);
  }

  function renderDiscountTable(t){
    const el = document.getElementById('discount-table-'+safeId(t.name));
    if (!el || !window.gridjs) return;
    const rows = Object.entries(t.discountSplit.types).sort((a,b)=>b[1]-a[1]).map(([k,v]) => [k, fmtMoney(v), classifyDiscount(k)==='comp'?'Comp/Complaint':'Discount']);
    new gridjs.Grid({
      columns: ['Type','Amount','Category'],
      data: rows,
      sort:true,
      style: {
        table: { 'font-family':'inherit', 'font-size':'12px', background:'#161616', color:'#f4f4f4' },
        th: { background:'#1e1e1e', color:'#9c9c9c', border:'1px solid #2b2b2b' },
        td: { background:'#161616', border:'1px solid #1c1c1c' }
      }
    }).render(el);
  }

  function initTablesFor(idx, group, sites){
    const t = idx===0 ? group : sites[idx-1];
    if (!t) return;

    if (t.isGroup){
      const tableEl = document.getElementById('group-table');
      if (tableEl && !tableEl.dataset.rendered){ tableEl.dataset.rendered='1'; renderGroupTable(group, sites); }
    } else {
      const discEl = document.getElementById('discount-table-'+safeId(t.name));
      if (discEl && !discEl.dataset.rendered){ discEl.dataset.rendered='1'; renderDiscountTable(t); }
    }
  }

  loadDashboard();

})();
</script>
