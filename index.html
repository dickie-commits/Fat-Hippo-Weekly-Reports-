<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fat Hippo Weekly Site Report</title>
<style>
  :root{ color-scheme: light; }

  :root{
    --bg:#0a0a0a;
    --panel:#161616;
    --panel-alt:#1e1e1e;
    --panel-border:#2b2b2b;
    --mint:#2fe6a6;
    --mint-dim:rgba(47,230,166,0.14);
    --text:#f4f4f4;
    --text-dim:#9c9c9c;
    --red:#ff6161;
    --red-dim:rgba(255,97,97,0.14);
    --amber:#ffb84d;
    --amber-dim:rgba(255,184,77,0.14);
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;padding:0;
    background:var(--bg);
    color:var(--text);
    font-family: "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
    font-size:13px;
    line-height:1.5;
  }

  #app{
    min-height:100vh;
    background:
      radial-gradient(ellipse 900px 300px at 15% -10%, rgba(47,230,166,0.08), transparent 60%),
      var(--bg);
    padding-bottom:60px;
  }

  header{
    display:flex;
    align-items:center;
    gap:18px;
    padding:22px 28px 18px 28px;
    border-bottom:1px solid var(--panel-border);
    flex-wrap:wrap;
  }

  .logo-mark{ flex-shrink:0; }

  .title-block{ flex:1; min-width:260px; }

  h1.brand{
    font-family: Arial, "Helvetica Neue", sans-serif;
    font-weight:900;
    letter-spacing:0.5px;
    font-size:30px;
    margin:0;
    color:#fff;
    text-transform:uppercase;
    text-shadow: 1px 1px 0 rgba(47,230,166,0.35), -1px -1px 0 rgba(255,255,255,0.05);
  }

  .subtitle{
    margin-top:4px;
    color:var(--mint);
    font-size:13px;
    letter-spacing:0.5px;
  }

  .subtitle .muted{ color:var(--text-dim); }

  .status-pill{
    margin-left:auto;
    font-size:11px;
    color:var(--text-dim);
    border:1px solid var(--panel-border);
    border-radius:20px;
    padding:6px 14px;
    background:var(--panel);
    white-space:nowrap;
  }

  .status-pill.live::before{
    content:"";
    display:inline-block;
    width:7px;height:7px;
    border-radius:50%;
    background:var(--mint);
    margin-right:7px;
    box-shadow:0 0 6px var(--mint);
  }

  nav#tabs{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:14px 28px;
    border-bottom:1px solid var(--panel-border);
    background:#0d0d0d;
    scrollbar-width:thin;
  }
  nav#tabs::-webkit-scrollbar{height:6px;}
  nav#tabs::-webkit-scrollbar-thumb{background:var(--panel-border); border-radius:4px;}

  .tab-btn{
    flex-shrink:0;
    background:var(--panel);
    color:var(--text-dim);
    border:1px solid var(--panel-border);
    border-radius:8px;
    padding:8px 16px;
    font-family:inherit;
    font-size:12px;
    letter-spacing:0.4px;
    text-transform:uppercase;
    cursor:pointer;
    transition:all .15s ease;
  }
  .tab-btn:hover{ color:#fff; border-color:var(--mint); }
  .tab-btn.active{
    background:var(--mint-dim);
    color:var(--mint);
    border-color:var(--mint);
    font-weight:700;
  }
  .tab-btn.group-tab{ font-weight:700; }

  main{ padding:26px 28px; }

  .panel{ display:none; animation:fadein .2s ease; }
  .panel.active{ display:block; }
  @keyframes fadein{ from{opacity:0;} to{opacity:1;} }

  .section{
    margin-bottom:30px;
  }

  .section-title{
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:12px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .section-title::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--panel-border);
  }

  .card-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(180px,1fr));
    gap:12px;
  }

  .card{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:10px;
    padding:16px 18px;
  }

  .card .label{
    font-size:10.5px;
    color:var(--text-dim);
    text-transform:uppercase;
    letter-spacing:0.6px;
    margin-bottom:8px;
  }

  .card .value{
    font-size:22px;
    font-weight:700;
    color:#fff;
  }

  .card .value.mint{ color:var(--mint); }
  .card .value.red{ color:var(--red); }
  .card .value.amber{ color:var(--amber); }

  .mtd-block{ margin-bottom:14px; }
  .mtd-block .mtd-name{
    font-weight:700;
    color:#fff;
    font-size:13px;
    margin-bottom:8px;
  }
  .mtd-row{
    display:flex;
    gap:10px;
    flex-wrap:nowrap;
    overflow-x:auto;
    padding-bottom:2px;
  }
  .mtd-row .card{ flex:1 1 0; min-width:150px; }

  .stat-card-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
    gap:12px;
  }
  .stat-card{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:10px;
    padding:14px 16px;
  }
  .stat-card .stat-name{
    font-weight:700;
    color:#fff;
    font-size:13px;
    margin-bottom:8px;
  }
  .stat-card .stat-row{
    display:flex;
    justify-content:space-between;
    gap:10px;
    font-size:11.5px;
    padding:4px 0;
    border-top:1px solid var(--panel-border);
  }
  .stat-card .stat-row:first-of-type{ border-top:none; }
  .stat-card .stat-label{ color:var(--text-dim); }
  .stat-card .stat-value{ color:var(--text); font-variant-numeric:tabular-nums; }

  .card .delta{
    margin-top:6px;
    font-size:11.5px;
  }
  .delta.pos{ color:var(--mint); }
  .delta.neg{ color:var(--red); }
  .delta.flat{ color:var(--text-dim); }

  .card .rag-caption{
    margin-top:6px;
    font-size:10.5px;
    color:var(--text-dim);
  }

  .card.rag-good{
    border-color:rgba(47,230,166,0.55);
    background:linear-gradient(180deg, rgba(47,230,166,0.10), var(--panel) 70%);
  }
  .card.rag-good .value{ color:var(--mint); }

  .card.rag-bad{
    border-color:rgba(255,97,97,0.6);
    background:linear-gradient(180deg, rgba(255,97,97,0.10), var(--panel) 70%);
  }
  .card.rag-bad .value{ color:var(--red); }

  .section-subtitle{
    font-size:11px;
    color:var(--text-dim);
    margin:-6px 0 12px 0;
  }

  .review-card{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:10px;
    padding:14px 16px;
    margin-bottom:10px;
  }
  .review-card.negative{
    border-color:rgba(255,97,97,0.55);
    background:linear-gradient(180deg, rgba(255,97,97,0.08), var(--panel) 60%);
  }
  .review-meta{
    font-size:11px;
    color:var(--text-dim);
    margin-bottom:8px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    align-items:center;
  }
  .review-meta b{ color:#fff; }
  .platform-badge{
    display:inline-block;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    padding:2px 8px;
    border-radius:20px;
    background:var(--panel-alt);
    border:1px solid var(--panel-border);
    color:var(--text-dim);
  }
  .stars{ color:var(--amber); letter-spacing:1px; }
  .review-text{ font-size:12.5px; color:#e9e9e9; line-height:1.5; }
  .no-reviews{ color:var(--text-dim); font-style:italic; padding:10px 4px; }

  table.gh{
    width:100%;
    border-collapse:collapse;
    font-size:12px;
  }
  table.gh th{
    text-align:left;
    color:var(--text-dim);
    font-weight:600;
    text-transform:uppercase;
    font-size:10px;
    letter-spacing:0.5px;
    padding:8px 10px;
    border-bottom:1px solid var(--panel-border);
  }
  table.gh td{
    padding:9px 10px;
    border-bottom:1px solid #1c1c1c;
    color:var(--text);
  }
  table.gh tbody tr:hover{ background:#191919; }
  table.gh td.num{ text-align:right; font-variant-numeric:tabular-nums; }

  .info-box{
    background:var(--panel-alt);
    border:1px dashed var(--panel-border);
    border-radius:10px;
    padding:16px 18px;
    display:flex;
    gap:12px;
    align-items:flex-start;
  }
  .info-box .dot{
    flex-shrink:0;
    width:20px;height:20px;
    border-radius:50%;
    background:var(--mint);
    color:#00251a;
    font-weight:900;
    font-size:12px;
    display:flex;align-items:center;justify-content:center;
    margin-top:2px;
  }

  .log-entry{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:10px;
    padding:14px 16px;
    margin-bottom:10px;
  }
  .log-entry .log-meta{
    font-size:11px;
    color:var(--text-dim);
    margin-bottom:8px;
    display:flex;
    gap:14px;
    flex-wrap:wrap;
  }
  .log-entry .log-meta b{ color:var(--mint); }
  .log-field{ margin-bottom:6px; font-size:12.5px; }
  .log-field .fname{ color:var(--text-dim); }

  .no-logs{
    color:var(--text-dim);
    font-style:italic;
    padding:14px 4px;
  }

  .summary-box{
    background:linear-gradient(135deg, rgba(47,230,166,0.07), rgba(47,230,166,0.01));
    border:1px solid var(--mint);
    border-radius:10px;
    padding:18px 20px;
    font-size:13px;
    line-height:1.7;
    color:#e9e9e9;
  }
  .summary-box b{ color:var(--mint); }

  .loading{
    padding:80px 20px;
    text-align:center;
    color:var(--text-dim);
  }
  .loading .spinner{
    width:28px;height:28px;
    border-radius:50%;
    border:3px solid var(--panel-border);
    border-top-color:var(--mint);
    margin:0 auto 16px auto;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .err-banner{
    background:var(--red-dim);
    border:1px solid var(--red);
    color:#ffb3b3;
    padding:10px 14px;
    border-radius:8px;
    font-size:12px;
    margin-bottom:18px;
  }

  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-thumb{ background:#2b2b2b; border-radius:4px; }
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/gridjs@5.0.2/dist/gridjs.umd.js" integrity="sha384-/XXDzxe4FsGiAe50i/u9pY/Vy/uX654MHB1xoc1BJNnH1WXHhqHga9g3q5tF4gj7" crossorigin="anonymous"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridjs@5.0.2/dist/theme/mermaid.min.css">

<script>
(function(){

  const CCY_SYMBOLS = { GBP:'£', USD:'$', EUR:'€' };
  let CCY = '£';

  const fmtMoney = (n) => {
    if (n===null || n===undefined || isNaN(n)) return 'n/a';
    const sign = n<0 ? '-' : '';
    return sign + CCY + Math.abs(n).toLocaleString('en-GB',{minimumFractionDigits:0, maximumFractionDigits:0});
  };
  const fmtPct = (n, dp=1) => (n===null||n===undefined||isNaN(n)) ? 'n/a' : (n>=0?'':'') + n.toFixed(dp) + '%';
  const fmtSignedPct = (n, dp=1) => {
    if (n===null||n===undefined||isNaN(n)) return 'n/a';
    return (n>0?'+':'') + n.toFixed(dp) + '%';
  };

  function deltaClass(n, invert){
    if (n===null||n===undefined||isNaN(n)) return 'flat';
    if (invert) n = -n;
    if (n > 0.4) return 'pos';
    if (n < -0.4) return 'neg';
    return 'flat';
  }

  // ---------- date helpers (all dates handled as UTC midnight to avoid TZ drift) ----------
  const parseISO = (s) => new Date(s + 'T00:00:00Z');
  const toISO = (d) => d.toISOString().slice(0,10);
  const addDays = (d, n) => { const r = new Date(d); r.setUTCDate(r.getUTCDate()+n); return r; };
  const isoDow = (d) => { const day = d.getUTCDay(); return day===0 ? 7 : day; }; // Mon=1..Sun=7
  const fmtHuman = (d) => d.toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric', timeZone:'UTC'});

  // ---------- generic row-field extractor (Tenzo field names vary by metric/model) ----------
  function extractRow(row, metricKey){
    let location=null, discountType=null, housePart=null;
    for (const k of Object.keys(row)){
      if (k===metricKey) continue;
      const lk = k.toLowerCase();
      if (lk.includes('housepart')) housePart = row[k];
      else if (lk.includes('discount')) discountType = row[k];
      else if (lk.includes('location')) location = row[k];
    }
    return { location, discountType, housePart, value: Number(row[metricKey])||0 };
  }

  function sumByLocation(rows, metricKey){
    const out = {};
    for (const r of rows){
      const {location, value} = extractRow(r, metricKey);
      if (!location) continue;
      out[location] = (out[location]||0) + value;
    }
    return out;
  }

  function classifyDiscount(name){
    const n = (name||'').toLowerCase();
    if (n.includes('discount') || n.includes('loyalty')) return 'discount';
    return 'comp';
  }

  // Weekly labour % targets by site (from ops target sheet). FOH and BOH each get half the site target.
  const LABOUR_TARGETS = {
    'Birmingham': 30,
    'Cardiff': 32,
    'Durham': 32,
    'Edinburgh': 32,
    'Glasgow': 32,
    'Leeds': 32,
    'Leeds (Headingley)': 34,
    'Liverpool': 32,
    'Newcastle (Centre)': 31.8,
    'Newcastle (Jesmond)': 30,
    'Nottingham': 32,
    'York': 32
  };

  // at/below target = good (green), above target = bad (red). Returns '' if no target available.
  function ragClass(value, target){
    if (value==null || target==null || isNaN(value) || isNaN(target)) return '';
    return value <= target ? 'rag-good' : 'rag-bad';
  }

  function normSource(s){
    const n = (s||'').toLowerCase();
    if (n.includes('google')) return 'Google';
    if (n.includes('tripadvisor') || n.includes('trip advisor')) return 'TripAdvisor';
    return s || 'Other';
  }

  // Favouritetable has no Tenzo/API integration, so its rating + review count are captured
  // manually from https://www.favouritetable.com and baked in here rather than fetched live.
  // No historical monthly split or individual review text is exposed by the site, so there is
  // no month-on-month trend and no review-level negative-review list for this platform — only
  // a "rating below 4.0" flag as a proxy signal. Re-capture periodically to keep this current.
  const FAVOURITETABLE_CAPTURED = '2026-07-15';
  const FAVOURITETABLE_SNAPSHOT = {
    'Birmingham':          { rating: 4.2, reviews: 788 },
    'Cardiff':             { rating: 4.1, reviews: 1113 },
    'Durham':              { rating: 4.3, reviews: 775 },
    'Edinburgh':           { rating: 3.9, reviews: 459 },
    'Glasgow':             { rating: 4.2, reviews: 875 },
    'Leeds':               { rating: 4.0, reviews: 97 },
    'Leeds (Headingley)':  { rating: 4.2, reviews: 424 },
    'Liverpool':           { rating: 4.1, reviews: 668 },
    'Newcastle (Centre)':  { rating: 4.4, reviews: 1290 },
    'Newcastle (Jesmond)': { rating: 4.7, reviews: 319 },
    'Nottingham':          { rating: 4.3, reviews: 1220 },
    'York':                { rating: 4.0, reviews: 727 }
  };

  // Wastage only ever shows up against Food or Drink categories (consumable/overhead categories
  // consistently log zero wastage), so anything not explicitly "Drink" is treated as Food here —
  // this is intentionally simpler than the purchase-side "order" rule above.
  function classifyWastageBucket(name){
    return (name||'').toLowerCase().includes('drink') ? 'Drink' : 'Food';
  }
  function extractCatRow(row, metricKey){
    let location=null, category=null;
    for (const k of Object.keys(row)){
      if (k===metricKey) continue;
      const lk = k.toLowerCase();
      if (lk.includes('location')) location = row[k];
      else if (lk.includes('category')) category = row[k];
    }
    return { location, category, value: Number(row[metricKey])||0 };
  }
  function extractItemRow(row, metricKey){
    let location=null, item=null;
    for (const k of Object.keys(row)){
      if (k===metricKey) continue;
      const lk = k.toLowerCase();
      if (lk.includes('location')) location = row[k];
      else if (lk.includes('item')) item = row[k];
    }
    return { location, item, value: Number(row[metricKey])||0 };
  }

  function fmtRating(n){ return (n==null||isNaN(n)) ? 'n/a' : n.toFixed(1)+' ★'; }
  function fmtStars(n){
    if (n==null||isNaN(n)) return '';
    const full = Math.round(n);
    return '★'.repeat(Math.max(0,Math.min(5,full))) + '☆'.repeat(5-Math.max(0,Math.min(5,full)));
  }

  // This dashboard fires a lot of individual Tenzo queries (last week, current/next week, MTD
  // split into month-sized chunks, plus one wastage-by-item call per site) — 30+ in total, and
  // the 12 per-site wastage calls land as one extra burst right after the main batch. Capping how
  // many run *simultaneously* wasn't enough on its own: even at 3 concurrent, a fast-completing
  // batch can still dispatch a new call every instant, which reads as a burst to a requests-per-
  // second style limiter. So this also enforces a minimum gap between dispatching any two calls
  // (a simple rate limiter, not just a concurrency cap), and gives rate-limited calls more,
  // longer-spaced retries before giving up.
  function createLimiter(concurrency, minGapMs){
    let active = 0;
    let lastDispatch = 0;
    const queue = [];
    function next(){
      if (active >= concurrency || queue.length === 0) return;
      const wait = Math.max(0, (lastDispatch + minGapMs) - Date.now());
      setTimeout(() => {
        if (active >= concurrency || queue.length === 0) return;
        active++;
        lastDispatch = Date.now();
        const { fn, resolve, reject } = queue.shift();
        fn().then(r => { active--; resolve(r); next(); }, e => { active--; reject(e); next(); });
      }, wait);
    }
    return function runLimited(fn){
      return new Promise((resolve, reject) => { queue.push({ fn, resolve, reject }); next(); });
    };
  }
  const withLimit = createLimiter(2, 200);
  const sleep = (ms) => new Promise(r => setTimeout(r, ms));

  async function callTool(name, args){
    return withLimit(async () => {
      let lastErr;
      const maxAttempts = 5;
      for (let attempt = 0; attempt < maxAttempts; attempt++){
        if (attempt > 0) await sleep(600 * attempt);
        try {
          const r = await window.cowork.callMcpTool(name, args);
          if (r.isError){
            const msg = (r.content && r.content[0] && r.content[0].text) || 'tool error';
            if (/rate limit/i.test(msg) && attempt < maxAttempts-1){ lastErr = new Error(msg); continue; }
            throw new Error(msg);
          }
          return r.structuredContent ?? JSON.parse(r.content[0].text);
        } catch(e){
          lastErr = e;
          if (!/rate limit/i.test(e.message||'') || attempt === maxAttempts-1) throw e;
        }
      }
      throw lastErr;
    });
  }

  // The wastage "worth flagging" view shows only the top N wasted lines for the period (by
  // value), rather than a threshold-based filter. Shared between the data build (loadDashboard)
  // and the render (renderPanel), so it lives at top level.
  const WASTE_HIGHLIGHT_COUNT = 5;

  const BUSINESS_ID = 1052;
  const T = {
    ctx: 'mcp__fb8e4b2b-4659-4c02-9dcc-f77247be2170__get_analytics_context',
    locs: 'mcp__fb8e4b2b-4659-4c02-9dcc-f77247be2170__get_locations',

      wastageHighlightsBySite[name] = items.slice(0, WASTE_HIGHLIGHT_COUNT);
    });

    const mtdStats = buildPeriodStats(salesMTD, laborMTD, wastageMTD, siteNames);

    const mSalesLast   = sumByLocation(salesLast.data||[], 'sales');
    const mSalesPrior  = sumByLocation(salesPrior.data||[], 'sales');
    const mSalesLY     = sumByLocation(salesLY.data||[], 'sales');
    const mForecast    = sumByLocation(forecastLast.data||[], 'forecast_sales');
    const mLabor       = sumByLocation(laborLast.data||[], 'labor_cost');
    const mPlannedLab  = sumByLocation(plannedLaborLast.data||[], 'planned_labor_cost');
    const mDiscounts   = sumByLocation(discountsLast.data||[], 'discounts');
    const mWastage     = sumByLocation(wastageLast.data||[], 'wastage');
    const mForecastCW  = sumByLocation(forecastCurrentWeek.data||[], 'forecast_sales');
    const mPlannedLabCW = sumByLocation(plannedLaborCurrentWeek.data||[], 'planned_labor_cost');
    const mForecastNW  = sumByLocation(forecastNextWeek.data||[], 'forecast_sales');
    const mPlannedLabNW = sumByLocation(plannedLaborNextWeek.data||[], 'planned_labor_cost');

    // wastage split: {site: {Food,Drink}} — last week category totals (used for £/% cards);
    // exact wasted products come from wastageItemsBySite (item-level, queried separately above).
    const wastageSplit = {};
    for (const r of (wastageByCatLast.data||[])){
      const {location, category, value} = extractCatRow(r, 'wastage');
      if (!location) continue;
      wastageSplit[location] = wastageSplit[location] || {Food:0, Drink:0};
      wastageSplit[location][classifyWastageBucket(category)] += value;
    }

    // Month To Date stats per site: {site: {sales, labor, laborPct, wastage}}
    function buildPeriodStats(salesData, laborData, wastageData, names){
      const s = sumByLocation(salesData.data||[], 'sales');
      const l = sumByLocation(laborData.data||[], 'labor_cost');
      const w = sumByLocation(wastageData.data||[], 'wastage');
      const out = {};
      for (const name of names){
        const sales = s[name] ?? null;
        const labor = l[name] ?? null;
        out[name] = {
          sales, labor,
          laborPct: (labor!=null && sales) ? (labor/sales*100) : null,
          wastage: w[name] ?? null
        };
      }
      return out;
    }

    // house part split: {site: {FOH,BOH,Other}}
    const houseSplit = {};
    for (const r of (laborByHousePart.data||[])){
      const {location, housePart, value} = extractRow(r, 'labor_cost');
      if (!location) continue;
      houseSplit[location] = houseSplit[location] || {FOH:0, BOH:0, Other:0};
      const hp = (housePart||'').toUpperCase();
      if (hp==='FOH') houseSplit[location].FOH += value;
      else if (hp==='BOH') houseSplit[location].BOH += value;
      else houseSplit[location].Other += value;
    }

    // discount breakdown: {site: {discount:x, comp:y, types:[{name,value}]}}
    const discountSplit = {};
    for (const r of (discountsByType.data||[])){
      const {location, discountType, value} = extractRow(r, 'discounts');
      if (!location) continue;
      discountSplit[location] = discountSplit[location] || {discount:0, comp:0, types:{}};
      const bucket = classifyDiscount(discountType);
      discountSplit[location][bucket] += value;
      discountSplit[location].types[discountType||'Other'] = (discountSplit[location].types[discountType||'Other']||0) + value;
    }

    // logs grouped by site
    const logsBySite = {};
    for (const l of (logsRes.results||[])){
      const site = l.location_name || 'Unknown';
      logsBySite[site] = logsBySite[site] || [];
      logsBySite[site].push(l);
    }

    // reviews: monthly score map {site: {Google:{avg,count}}} (Favouritetable is a static snapshot, built separately)
    function buildReviewScoreMap(avgData, countData){
      const countMap = {};
      for (const r of countData){
        let loc=null, src=null;
        for (const k of Object.keys(r)){
          if (k==='num_reviews') continue;
          if (k.toLowerCase().includes('location')) loc = r[k];
          else if (k==='source_id') src = r[k];
        }
        if (!loc) continue;
        countMap[loc+'|'+normSource(src)] = r.num_reviews;
      }
      const out = {};
      for (const r of avgData){
        let loc=null, src=null;
        for (const k of Object.keys(r)){
          if (k==='avg_rating') continue;
          if (k.toLowerCase().includes('location')) loc = r[k];
          else if (k==='source_id') src = r[k];
        }
        if (!loc) continue;
        const platform = normSource(src);
        out[loc] = out[loc] || {};
        out[loc][platform] = { avg: r.avg_rating, count: countMap[loc+'|'+platform] || 0 };
      }
      return out;
    }
    const scoreWeek = buildReviewScoreMap(avgRatingWeek.data||[], numReviewsWeek.data||[]);
    const scoreWeekPrior = buildReviewScoreMap(avgRatingWeekPrior.data||[], numReviewsWeekPrior.data||[]);
    const scoreMTD = buildReviewScoreMap(avgRatingMTD.data||[], numReviewsMTD.data||[]);
    const scoreMTDPrior = buildReviewScoreMap(avgRatingMTDPrior.data||[], numReviewsMTDPrior.data||[]);

    // negative reviews (<=3 stars, with real text) from last week, grouped by site
    const negativeBySite = {};
    for (const r of lastWeekReviews){
      const txt = (r.text||'').trim();
      if (!txt || txt.toLowerCase()==='no text for this review') continue;
      if ((r.rating||5) > 3) continue;
      const site = r.location_name || 'Unknown';
      negativeBySite[site] = negativeBySite[site] || [];
      negativeBySite[site].push({ platform: normSource(r.source), name: r.name, rating: r.rating, text: txt, date: r.review_datetime });
    }
    for (const site in negativeBySite){ negativeBySite[site].sort((a,b)=> (a.date<b.date?1:-1)); }

    function platformScore(name, platform, map){
      const e = (map[name]||{})[platform];
      return e || null;
    }

    function buildSiteReviews(name){
      const out = {};
      const week = platformScore(name, 'Google', scoreWeek);
      const weekPrior = platformScore(name, 'Google', scoreWeekPrior);
      const weekShiftPct = (week && week.avg!=null && weekPrior && weekPrior.avg) ? ((week.avg-weekPrior.avg)/weekPrior.avg*100) : null;
      const mtd = platformScore(name, 'Google', scoreMTD);
      const mtdPrior = platformScore(name, 'Google', scoreMTDPrior);
      const mtdShiftPct = (mtd && mtd.avg!=null && mtdPrior && mtdPrior.avg) ? ((mtd.avg-mtdPrior.avg)/mtdPrior.avg*100) : null;
      out.Google = {
        weekAvg: week?week.avg:null, weekCount: week?week.count:0, weekShiftPct,
        mtdAvg: mtd?mtd.avg:null, mtdCount: mtd?mtd.count:0, mtdShiftPct
      };

      const ft = FAVOURITETABLE_SNAPSHOT[name] || null;
      out.Favouritetable = { avg: ft?ft.rating:null, count: ft?ft.reviews:0, static: true, captured: FAVOURITETABLE_CAPTURED };

      out.negative = (negativeBySite[name]||[]).slice(0, 8);
      return out;
    }

    function buildSite(name){
      const sales = mSalesLast[name] ?? null;
      const forecast = mForecast[name] ?? null;
      const prior = mSalesPrior[name] ?? null;
      const ly = mSalesLY[name] ?? null;
      const labor = mLabor[name] ?? null;
      const plannedLabor = mPlannedLab[name] ?? null;
      const wastage = mWastage[name] ?? null;
      const discounts = mDiscounts[name] ?? null;
      const hs = houseSplit[name] || {FOH:0,BOH:0,Other:0};
      const ds = discountSplit[name] || {discount:0, comp:0, types:{}};
      const target = LABOUR_TARGETS[name] ?? null;
      const halfTarget = target!=null ? target/2 : null;

      const fcCW = mForecastCW[name] ?? null;
      const plCW = mPlannedLabCW[name] ?? null;
      const fcNW = mForecastNW[name] ?? null;
      const plNW = mPlannedLabNW[name] ?? null;

      const ws = wastageSplit[name] || {Food:0, Drink:0};
      const wastageHighlights = wastageHighlightsBySite[name] || [];
      const wastageItems = wastageItemsBySite[name] || []; // full merged-by-item list, used to roll up the All Sites highlights

      return {
        name,
        sales, forecast, prior, ly, labor, plannedLabor, wastage, discounts,
        target, halfTarget,
        vsForecastPct: (sales!=null && forecast) ? ((sales-forecast)/forecast*100) : null,
        vsPriorPct: (sales!=null && prior) ? ((sales-prior)/prior*100) : null,
        vsLYPct: (sales!=null && ly) ? ((sales-ly)/ly*100) : null,
        actualLaborPct: (labor!=null && sales) ? (labor/sales*100) : null,
        forecastLaborPct: (plannedLabor!=null && forecast) ? (plannedLabor/forecast*100) : null,
        fohAmt: hs.FOH, bohAmt: hs.BOH,
        fohPct: (sales) ? (hs.FOH/sales*100) : null,
        bohPct: (sales) ? (hs.BOH/sales*100) : null,
        otherPct: (sales && hs.Other) ? (hs.Other/sales*100) : 0,
        wastagePct: (wastage!=null && sales) ? (wastage/sales*100) : null,
        discountPct: (discounts!=null && sales) ? (discounts/sales*100) : null,
        discountSplit: ds,
        wastageByType: ws,
        wastageFoodPctRev: (sales) ? (ws.Food/sales*100) : null,
        wastageDrinkPctRev: (sales) ? (ws.Drink/sales*100) : null,
        wastageHighlights,
        wastageItems,
        logs: logsBySite[name] || [],
        currentWeek: {
          plannedLabor: plCW, forecast: fcCW,
          plannedLaborPct: (plCW!=null && fcCW) ? (plCW/fcCW*100) : null
        },
        nextWeek: {
          plannedLabor: plNW, forecast: fcNW,
          plannedLaborPct: (plNW!=null && fcNW) ? (plNW/fcNW*100) : null
        },
        reviews: buildSiteReviews(name)
      };
    }

    const sites = siteNames.map(buildSite);

    function sumOrNull(arr){
      const vals = arr.filter(v=>v!=null);
      if (!vals.length) return null;
      return vals.reduce((a,b)=>a+b,0);
    }

    const groupSales = sumOrNull(sites.map(s=>s.sales));
    const groupForecast = sumOrNull(sites.map(s=>s.forecast));
    const groupPrior = sumOrNull(sites.map(s=>s.prior));
    const groupLY = sumOrNull(sites.map(s=>s.ly));
    const groupLabor = sumOrNull(sites.map(s=>s.labor));
    const groupPlannedLabor = sumOrNull(sites.map(s=>s.plannedLabor));
    const groupWastage = sumOrNull(sites.map(s=>s.wastage));
    const groupDiscounts = sumOrNull(sites.map(s=>s.discounts));
    const groupFOH = sumOrNull(sites.map(s=> (houseSplit[s.name]||{}).FOH ?? null));
    const groupBOH = sumOrNull(sites.map(s=> (houseSplit[s.name]||{}).BOH ?? null));
    const groupOther = sumOrNull(sites.map(s=> (houseSplit[s.name]||{}).Other ?? null));
    const groupDiscountTypeD = sumOrNull(sites.map(s=>s.discountSplit.discount));
    const groupDiscountTypeC = sumOrNull(sites.map(s=>s.discountSplit.comp));
    const groupPlannedLaborCW = sumOrNull(sites.map(s=>s.currentWeek.plannedLabor));
    const groupForecastCW = sumOrNull(sites.map(s=>s.currentWeek.forecast));
    const groupPlannedLaborNW = sumOrNull(sites.map(s=>s.nextWeek.plannedLabor));
    const groupForecastNW = sumOrNull(sites.map(s=>s.nextWeek.forecast));

    const groupWastageByType = {
      Food: sumOrNull(sites.map(s=>s.wastageByType.Food))||0,
      Drink: sumOrNull(sites.map(s=>s.wastageByType.Drink))||0
    };
    // Combine every site's item-level wastage into one cross-site list, then surface only the
    // top N wasted lines by value across the group this week.
    const groupWastageHighlights = (() => {
      const agg = {};
      sites.forEach(s => (s.wastageItems||[]).forEach(({item,value,count}) => {
        agg[item] = agg[item] || { item, value: 0, count: 0 };
        agg[item].value += value;
        agg[item].count += (count||1);
      }));
      return Object.values(agg).sort((a,b)=>b.value-a.value).slice(0, WASTE_HIGHLIGHT_COUNT);
    })();

    // Weighted (by review count) average across sites for a given field-pair on t.reviews.Google.
    function weightedGoogle(avgField, countField){
      let sumRC=0, sumC=0;
      for (const s of sites){
        const g = s.reviews.Google;
        if (g && g[countField]){ sumRC += g[avgField]*g[countField]; sumC += g[countField]; }
      }
      return sumC ? {avg:sumRC/sumC, count:sumC} : {avg:null, count:0};
    }
    function weightedFavouritetable(){
      let sumRC=0, sumC=0;
      for (const s of sites){
        const e = s.reviews.Favouritetable;
        if (e && e.count){ sumRC += e.avg*e.count; sumC += e.count; }
      }
      return sumC ? {avg:sumRC/sumC, count:sumC} : {avg:null, count:0};
    }
    const groupReviews = {};
    {
      const week = weightedGoogle('weekAvg','weekCount');
      const mtd = weightedGoogle('mtdAvg','mtdCount');
      // Shift %s can't be reweighted from already-averaged data, so use the simple mean of each
      // site's own shift (only where that site actually has a prior-period figure to compare).
      const weekShifts = sites.map(s=>s.reviews.Google.weekShiftPct).filter(v=>v!=null);
      const mtdShifts = sites.map(s=>s.reviews.Google.mtdShiftPct).filter(v=>v!=null);
      groupReviews.Google = {
        weekAvg: week.avg, weekCount: week.count,
        weekShiftPct: weekShifts.length ? weekShifts.reduce((a,b)=>a+b,0)/weekShifts.length : null,
        mtdAvg: mtd.avg, mtdCount: mtd.count,
        mtdShiftPct: mtdShifts.length ? mtdShifts.reduce((a,b)=>a+b,0)/mtdShifts.length : null
      };
      const ft = weightedFavouritetable();
      groupReviews.Favouritetable = { avg: ft.avg, count: ft.count, static: true, captured: FAVOURITETABLE_CAPTURED };
    }
    groupReviews.negative = sites.flatMap(s => (s.reviews.negative||[]).map(r => Object.assign({site:s.name}, r)))
      .sort((a,b)=> (a.date<b.date?1:-1)).slice(0, 12);

    const group = {
      name: 'All Sites',
      sales: groupSales, forecast: groupForecast, prior: groupPrior, ly: groupLY,
      labor: groupLabor, plannedLabor: groupPlannedLabor, wastage: groupWastage, discounts: groupDiscounts,
      target: null, halfTarget: null,
      vsForecastPct: (groupSales!=null && groupForecast) ? ((groupSales-groupForecast)/groupForecast*100) : null,
      vsPriorPct: (groupSales!=null && groupPrior) ? ((groupSales-groupPrior)/groupPrior*100) : null,
      vsLYPct: (groupSales!=null && groupLY) ? ((groupSales-groupLY)/groupLY*100) : null,
      actualLaborPct: (groupLabor!=null && groupSales) ? (groupLabor/groupSales*100) : null,
      forecastLaborPct: (groupPlannedLabor!=null && groupForecast) ? (groupPlannedLabor/groupForecast*100) : null,
      fohAmt: groupFOH||0, bohAmt: groupBOH||0,
      fohPct: (groupSales && groupFOH!=null) ? (groupFOH/groupSales*100) : null,
      bohPct: (groupSales && groupBOH!=null) ? (groupBOH/groupSales*100) : null,
      otherPct: (groupSales && groupOther) ? (groupOther/groupSales*100) : 0,
      wastagePct: (groupWastage!=null && groupSales) ? (groupWastage/groupSales*100) : null,
      discountPct: (groupDiscounts!=null && groupSales) ? (groupDiscounts/groupSales*100) : null,
      discountSplit: { discount: groupDiscountTypeD||0, comp: groupDiscountTypeC||0, types: {} },
      wastageByType: groupWastageByType,
      wastageFoodPctRev: (groupSales) ? (groupWastageByType.Food/groupSales*100) : null,
      wastageDrinkPctRev: (groupSales) ? (groupWastageByType.Drink/groupSales*100) : null,
      wastageHighlights: groupWastageHighlights,
      logs: (logsRes.results||[]),
      currentWeek: {
        plannedLabor: groupPlannedLaborCW, forecast: groupForecastCW,
        plannedLaborPct: (groupPlannedLaborCW!=null && groupForecastCW) ? (groupPlannedLaborCW/groupForecastCW*100) : null
      },
      nextWeek: {
        plannedLabor: groupPlannedLaborNW, forecast: groupForecastNW,
        plannedLaborPct: (groupPlannedLaborNW!=null && groupForecastNW) ? (groupPlannedLaborNW/groupForecastNW*100) : null
      },
      reviews: groupReviews,
      isGroup: true,
      siteRows: sites
    };

    const overviewTab = { name: 'Month To Date', isOverview: true, mtdStats, siteNames, sites };

    RANGE.mtdLabel = mtdLabel;
    RANGE.mtdPriorLabel = mtdPriorLabel;

    statusPill.textContent = 'Static snapshot \u00b7 captured 20 Jul 2026';
    statusPill.classList.remove('live');

    // ---------------- render ----------------
    const allTabs = [group, overviewTab, ...sites];
    tabsEl.innerHTML = '';
    allTabs.forEach((t, i) => {
      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (t.isGroup ? ' group-tab' : '') + (i===0 ? ' active' : '');
      btn.textContent = t.isOverview ? 'Month To Date' : (t.isGroup ? 'All Sites' : t.name);
      btn.dataset.idx = i;
      btn.addEventListener('click', () => activateTab(i));
      tabsEl.appendChild(btn);
    });

    content.innerHTML = '';
    if (errors.length){
      const banner = document.createElement('div');
      banner.className = 'err-banner';
      banner.textContent = 'Some data could not be loaded: ' + errors.join(' | ');
      content.appendChild(banner);
    }
    allTabs.forEach((t, i) => {
      const panel = document.createElement('div');
      panel.className = 'panel' + (i===0 ? ' active' : '');
      panel.id = 'panel-'+i;
      panel.innerHTML = renderPanel(t, RANGE, CCY);
      content.appendChild(panel);
    });

    // group summary table + per-site lazy tables (discount breakdown)
    renderGroupTable(group, sites);
    initTablesFor(0, allTabs);

    function activateTab(i){
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', Number(b.dataset.idx)===i));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-'+i).classList.add('active');
      initTablesFor(i, allTabs);
    }
  }

  function pctCard(label, value, opts){
    opts = opts||{};
    const cls = value==null ? '' : (opts.invert ? deltaClass(-value) : deltaClass(value));
    const colorCls = value==null ? '' : (cls==='pos'?'mint':cls==='neg'?'red':'');
    return '<div class="card"><div class="label">'+label+'</div><div class="value '+colorCls+'">'+fmtSignedPct(value)+'</div></div>';
  }

  function ragCard(label, valueStr, ragCls, caption, amountStr){
    return '<div class="card '+ragCls+'"><div class="label">'+label+'</div><div class="value">'+valueStr+'</div>'
      + (amountStr ? '<div class="delta flat">'+amountStr+'</div>' : '')
      + (caption ? '<div class="rag-caption">'+caption+'</div>' : '') + '</div>';
  }

  function renderPanel(t, RANGE, ccy){
    if (t.isOverview) return renderOverviewPanel(t, RANGE);

    const isGroup = !!t.isGroup;
    const fVsForecast = deltaClass(t.vsForecastPct);
    const fVsPrior = deltaClass(t.vsPriorPct);
    const fVsLY = deltaClass(t.vsLYPct);

    let html = '';

    html += '<div class="section"><div class="section-title">Revenue &mdash; last week ('+RANGE.last.s+' to '+RANGE.last.e+')</div>';
    html += '<div class="card-grid">';
    html += '<div class="card"><div class="label">Forecasted Revenue</div><div class="value">'+fmtMoney(t.forecast)+'</div></div>';
    html += '<div class="card"><div class="label">Actual Revenue</div><div class="value mint">'+fmtMoney(t.sales)+'</div></div>';
    html += cardWithDelta('vs Forecast', t.vsForecastPct, fVsForecast);
    html += cardWithDelta('vs Prior Week', t.vsPriorPct, fVsPrior);
    html += cardWithDelta('vs Same Week LY', t.vsLYPct, fVsLY);
    html += '</div></div>';

    // ---- Labour — Last Week (actual, RAG vs target, £ shown alongside every %) ----
    html += '<div class="section"><div class="section-title">Labour &mdash; Last Week</div>';
    html += '<div class="card-grid">';
    html += ragCard('Forecasted Labour %', fmtPct(t.forecastLaborPct), '', t.target!=null?('Target &le;'+t.target+'%'):'', fmtMoney(t.plannedLabor));
    html += ragCard('Actual Labour %', fmtPct(t.actualLaborPct), ragClass(t.actualLaborPct, t.target), t.target!=null?('Target &le;'+t.target+'%'):'', fmtMoney(t.labor));
    html += ragCard('FOH Labour %', fmtPct(t.fohPct), ragClass(t.fohPct, t.halfTarget), t.halfTarget!=null?('Target &le;'+t.halfTarget.toFixed(1)+'%'):'', fmtMoney(t.fohAmt));
    html += ragCard('BOH Labour %', fmtPct(t.bohPct), ragClass(t.bohPct, t.halfTarget), t.halfTarget!=null?('Target &le;'+t.halfTarget.toFixed(1)+'%'):'', fmtMoney(t.bohAmt));
    html += '</div></div>';

    // ---- Current Week / Next Week — Planned, and Discounts & Comps: per-site only ----
    // (All Sites already shows last week's actuals + the focus summary below; these forward-look
    // and discount details are more useful drilled into a single site than blended across 12.)
    if (!isGroup){
      html += '<div class="section"><div class="section-title">Current Week &mdash; Planned ('+RANGE.currentWeek.s+' to '+RANGE.currentWeek.e+')</div>';
      html += '<div class="card-grid">';
      html += '<div class="card"><div class="label">Planned Labour Cost</div><div class="value">'+fmtMoney(t.currentWeek.plannedLabor)+'</div></div>';
      html += '<div class="card"><div class="label">Forecasted Sales</div><div class="value">'+fmtMoney(t.currentWeek.forecast)+'</div></div>';
      html += ragCard('Planned Labour % of Sales', fmtPct(t.currentWeek.plannedLaborPct), ragClass(t.currentWeek.plannedLaborPct, t.target), t.target!=null?('Target &le;'+t.target+'%'):'');
      html += '</div></div>';

      html += '<div class="section"><div class="section-title">Next Week &mdash; Planned ('+RANGE.nextWeek.s+' to '+RANGE.nextWeek.e+')</div>';
      html += '<div class="card-grid">';
      html += '<div class="card"><div class="label">Planned Labour Cost</div><div class="value">'+fmtMoney(t.nextWeek.plannedLabor)+'</div></div>';
      html += '<div class="card"><div class="label">Forecasted Sales</div><div class="value">'+fmtMoney(t.nextWeek.forecast)+'</div></div>';
      html += ragCard('Planned Labour % of Sales', fmtPct(t.nextWeek.plannedLaborPct), ragClass(t.nextWeek.plannedLaborPct, t.target), t.target!=null?('Target &le;'+t.target+'%'):'');
      html += '</div></div>';

      html += '<div class="section"><div class="section-title">Discounts &amp; Comps</div>';
      html += '<div class="card-grid">';
      html += '<div class="card"><div class="label">Total Discounts &amp; Comps</div><div class="value amber">'+fmtMoney(t.discounts)+'</div></div>';
      html += '<div class="card"><div class="label">of which Discounts</div><div class="value">'+fmtMoney(t.discountSplit.discount)+'</div></div>';
      html += '<div class="card"><div class="label">of which Comps/Complaints</div><div class="value">'+fmtMoney(t.discountSplit.comp)+'</div></div>';
      html += '<div class="card"><div class="label">% of Revenue</div><div class="value">'+fmtPct(t.discountPct)+'</div></div>';
      html += '</div>';
      if (t.discountSplit.types && Object.keys(t.discountSplit.types).length){
        html += '<div style="margin-top:12px;" id="discount-table-'+safeId(t.name)+'"></div>';
      }
      html += '</div>';
    }

    // ---- Wastage (last week) ----
    html += '<div class="section"><div class="section-title">Wastage</div>';
    html += '<div class="section-subtitle">Last week (' +RANGE.last.s+' to '+RANGE.last.e+') &mdash; wastage as a share of revenue, split Food / Drink</div>';
    html += '<div class="card-grid">';
    html += '<div class="card"><div class="label">Food Wastage</div><div class="value red">'+fmtMoney(t.wastageByType.Food)+'</div>'
      + '<div class="rag-caption">'+fmtPct(t.wastageFoodPctRev)+' of revenue</div></div>';
    html += '<div class="card"><div class="label">Drink Wastage</div><div class="value red">'+fmtMoney(t.wastageByType.Drink)+'</div>'
      + '<div class="rag-caption">'+fmtPct(t.wastageDrinkPctRev)+' of revenue</div></div>';
    html += '<div class="card"><div class="label">Total Wastage</div><div class="value red">'+fmtMoney((t.wastageByType.Food||0)+(t.wastageByType.Drink||0))+'</div>'
      + '<div class="rag-caption">'+fmtPct(t.wastagePct)+' of revenue</div></div>';
    html += '</div>';
    // Item-level "worth flagging" breakdown is per-site detail — on All Sites it's replaced by
    // the consolidated focus summary further down, so it's dropped here to avoid duplicating it.
    if (!isGroup){
      html += '<div style="margin-top:14px;">';
      html += '<div class="section-title" style="font-size:10px;">Wastage Worth Flagging</div>';
      html += '<div class="section-subtitle">Top '+WASTE_HIGHLIGHT_COUNT+' wasted lines for the week &mdash; not the full line-by-line breakdown.</div>';
      const wi = (t.wastageHighlights||[]).filter(x=>x.value>0);
      if (wi.length){
        for (const w of wi){
          html += '<div class="log-entry" style="padding:8px 14px;margin-bottom:6px;display:flex;justify-content:space-between;gap:12px;">'
            + '<span>'+escapeHtml(w.item)+(w.count>1?' <span class="rag-caption">(&times;'+w.count+')</span>':'')+'</span>'
            + '<span class="value red" style="font-size:13px;">'+fmtMoney(w.value)+'</span></div>';
        }
      } else {
        html += '<div class="no-reviews">No wastage logged for this site this week.</div>';
      }
      html += '</div>';
    }
    html += '</div>';

    // ---- Reviews: per-site only (All Sites drops this — see the focus summary instead) ----
    if (!isGroup){
      html += '<div class="section"><div class="section-title">Reviews &mdash; Google &amp; Favouritetable</div>';
      html += '<div class="section-subtitle">Favouritetable has no live API &mdash; rating captured manually on '+FAVOURITETABLE_CAPTURED+', so no weekly/monthly trend is available for it.</div>';
      html += '<div class="card-grid">';
      {
        const rv = t.reviews.Google || {};
        const weekCls = rv.weekShiftPct==null ? 'flat' : (rv.weekShiftPct>0?'pos':(rv.weekShiftPct<0?'neg':'flat'));
        const mtdCls = rv.mtdShiftPct==null ? 'flat' : (rv.mtdShiftPct>0?'pos':(rv.mtdShiftPct<0?'neg':'flat'));
        html += '<div class="card"><div class="label">Google &mdash; Last Week</div><div class="value">'+fmtRating(rv.weekAvg)+'</div>'
          + '<div class="delta '+weekCls+'">'+(rv.weekShiftPct==null?'No prior-week data':fmtSignedPct(rv.weekShiftPct)+' shift vs prior week')+' &middot; '+(rv.weekCount||0)+' review'+(rv.weekCount===1?'':'s')+'</div></div>';
        html += '<div class="card"><div class="label">Google &mdash; '+RANGE.mtdLabel+' vs '+RANGE.mtdPriorLabel+'</div><div class="value">'+fmtRating(rv.mtdAvg)+'</div>'
          + '<div class="delta '+mtdCls+'">'+(rv.mtdShiftPct==null?'No prior-month data':fmtSignedPct(rv.mtdShiftPct)+' vs '+RANGE.mtdPriorLabel)+' &middot; '+(rv.mtdCount||0)+' review'+(rv.mtdCount===1?'':'s')+'</div></div>';
        const ft = t.reviews.Favouritetable || {avg:null,count:0};
        const ftLow = ft.avg!=null && ft.avg < 4.0;
        html += '<div class="card'+(ftLow?' rag-bad':'')+'"><div class="label">Favouritetable &mdash; Rating</div><div class="value">'+fmtRating(ft.avg)+'</div>'
          + '<div class="delta flat">Captured '+FAVOURITETABLE_CAPTURED+' &middot; '+ft.count+' review'+(ft.count===1?'':'s')+(ftLow?' &middot; below 4.0 &mdash; worth a look':'')+'</div></div>';
      }
      html += '</div>';
      html += '<div style="margin-top:16px;">';
      html += '<div class="section-title" style="font-size:10px;">Negative Reviews (&le;3&#9733; on Google) &mdash; week of '+RANGE.last.s+'</div>';
      const neg = t.reviews.negative || [];
      if (neg.length){
        for (const r of neg){
          html += '<div class="review-card negative"><div class="review-meta">'
            + '<span class="platform-badge">'+r.platform+'</span>'
            + '<span class="stars">'+fmtStars(r.rating)+'</span>'
            + '<span>'+(r.name||'Guest')+'</span>'
            + '<span>'+(r.date? String(r.date).slice(0,10) : '')+'</span>'
            + '</div><div class="review-text">'+escapeHtml(r.text)+'</div></div>';
        }
      } else {
        html += '<div class="no-reviews">No negative reviews (3&#9733; or below) with comments were logged for this site this week.</div>';
      }
      html += '</div>';
      html += '</div>';
      html += '</div>';
    }

    // Log Reports: per-site only — All Sites dropped this (12 sites' worth of full log text was
    // too much to be useful blended together; drill into a site tab to read them).
    if (!isGroup){
      html += '<div class="section"><div class="section-title">Log Reports &mdash; week of '+RANGE.last.s+'</div>';
      if (t.logs && t.logs.length){
        for (const l of t.logs){
          html += '<div class="log-entry"><div class="log-meta"><span><b>'+ (l.location_name||'') +'</b></span><span>'+ (l.logbook_name||'Log') +'</span><span>'+ (l.date_of_business||'') +'</span><span>'+ (l.author||'') +'</span></div>';
          const sections = (l.full_text && l.full_text.full_text) || [];
          for (const sec of sections){
            for (const f of (sec.section_content||[])){
              if (!f.field_value) continue;
              html += '<div class="log-field"><span class="fname">'+f.field_name+':</span> '+escapeHtml(String(f.field_value))+'</div>';
            }
          }
        }
      } else {
        html += '<div class="no-logs">No log reports were submitted for this site during this week. Flag with the GM to ensure the Weekly Site Report is logged going forward.</div>';
      }
      html += '</div>';
    }

    if (isGroup){
      html += '<div class="section"><div class="section-title">All Sites Last Week</div><div id="group-table"></div></div>';
      html += '<div class="section"><div class="section-title">Summary &amp; Where Focus Is Needed</div>';
      html += '<div class="summary-box">'+buildSummary(t)+' '+buildGroupFocusSummary(t.siteRows)+'</div></div>';
    } else {
      html += '<div class="section"><div class="section-title">Summary &amp; Where Staff Need To Focus</div>';
      html += '<div class="summary-box">'+buildSummary(t)+'</div></div>';
    }

    return html;
  }

  function buildGroupFocusSummary(sites){
    const laborOver = sites.filter(s=>s.target!=null && s.actualLaborPct!=null && s.actualLaborPct > s.target+0.3)
      .sort((a,b)=>(b.actualLaborPct-b.target)-(a.actualLaborPct-a.target));
    const wastageElevated = sites.filter(s=>s.wastagePct!=null && s.wastagePct>0.6).sort((a,b)=>b.wastagePct-a.wastagePct);
    const discountHigh = sites.filter(s=>s.discountPct!=null && s.discountPct>1.5).sort((a,b)=>b.discountPct-a.discountPct);
    const negReviewSites = sites.filter(s=>(s.reviews.negative||[]).length>0).sort((a,b)=>(b.reviews.negative.length)-(a.reviews.negative.length));
    const lowFavourite = sites.filter(s=>s.reviews.Favouritetable && s.reviews.Favouritetable.avg!=null && s.reviews.Favouritetable.avg < 4.0);
    const googleDown = sites.filter(s=>s.reviews.Google && s.reviews.Google.mtdShiftPct!=null && s.reviews.Google.mtdShiftPct <= -3);
    const missingLogs = sites.filter(s=>!s.logs || !s.logs.length);

    const parts = [];
    if (laborOver.length) parts.push('<b>Labour over target:</b> '+laborOver.map(s=>s.name+' ('+fmtPct(s.actualLaborPct)+' vs '+s.target+'% target)').join(', ')+'.');
    if (wastageElevated.length) parts.push('<b>Wastage elevated:</b> '+wastageElevated.map(s=>s.name+' ('+fmtPct(s.wastagePct)+' of revenue)').join(', ')+' &mdash; a focus area for kitchen prep and stock control.');
    if (discountHigh.length) parts.push('<b>Discounts/comps elevated:</b> '+discountHigh.map(s=>s.name+' ('+fmtPct(s.discountPct)+')').join(', ')+'.');
    if (negReviewSites.length) parts.push('<b>Negative Google reviews this week:</b> '+negReviewSites.map(s=>s.name+' ('+s.reviews.negative.length+')').join(', ')+' &mdash; worth a manager follow-up.');
    if (lowFavourite.length) parts.push('<b>Favouritetable rating below 4.0:</b> '+lowFavourite.map(s=>s.name+' ('+fmtRating(s.reviews.Favouritetable.avg)+')').join(', ')+'.');
    if (googleDown.length) parts.push('<b>Google score trending down:</b> '+googleDown.map(s=>s.name).join(', ')+' (month-to-date vs the same period last month).');
    if (missingLogs.length) parts.push('<b>Missing log reports:</b> '+missingLogs.map(s=>s.name).join(', ')+' did not submit a Weekly Site Report.');
    if (!parts.length) parts.push('No major outliers this week &mdash; all sites are broadly within target across labour, wastage, discounts and reviews.');
    return parts.join(' ');
  }

  // Month To Date: same card visual language as the per-site tabs (.card / .card-grid), but laid
  // out one row per location so every figure for a site reads across in a single line, rather
  // than the old stacked stat-card-per-site layout. Quarter/Year To Date were removed (not just
  // hidden) to cut down the number of Tenzo calls fired on every load, which was tripping the
  // rate limit.
  function renderOverviewPanel(t, RANGE){
    let html = '';
    html += '<div class="section"><div class="section-title">Month To Date</div>';
    html += '<div class="section-subtitle">Actual revenue and labour % to date, current-month Google and Favouritetable scores, and total wastage to date, live from Tenzo. Quarter/Year To Date views were dropped to reduce data load on each refresh.</div></div>';
    html += '<div class="section">';
    const mtdLabel = (RANGE && RANGE.mtdLabel) ? RANGE.mtdLabel : 'MTD';
    for (const name of t.siteNames){
      const s = t.mtdStats[name] || {};
      const site = (t.sites||[]).find(x=>x.name===name);
      const target = LABOUR_TARGETS[name] ?? null;
      const google = site ? site.reviews.Google : null;
      const fav = site ? site.reviews.Favouritetable : null;
      const favLow = fav && fav.avg!=null && fav.avg < 4.0;
      const laborRag = ragClass(s.laborPct, target);
      html += '<div class="mtd-block">';
      html += '<div class="mtd-name">'+escapeHtml(name)+'</div>';
      html += '<div class="mtd-row">';
      html += '<div class="card"><div class="label">Revenue MTD</div><div class="value mint">'+fmtMoney(s.sales)+'</div></div>';
      html += '<div class="card '+laborRag+'"><div class="label">Labour % MTD</div><div class="value">'+fmtPct(s.laborPct)+'</div>'
        + (target!=null ? ('<div class="rag-caption">Target &le;'+target+'%</div>') : '') + '</div>';
      html += '<div class="card"><div class="label">Google &mdash; '+mtdLabel+'</div><div class="value">'+(google?fmtRating(google.mtdAvg):'n/a')+'</div>'
        + '<div class="rag-caption">'+(google?(google.mtdCount||0):0)+' review'+((google&&google.mtdCount===1)?'':'s')+'</div></div>';
      html += '<div class="card'+(favLow?' rag-bad':'')+'"><div class="label">Favouritetable</div><div class="value">'+(fav?fmtRating(fav.avg):'n/a')+'</div>'
        + '<div class="rag-caption">Captured '+FAVOURITETABLE_CAPTURED+'</div></div>';
      html += '<div class="card"><div class="label">Total Wastage MTD</div><div class="value red">'+fmtMoney(s.wastage)+'</div></div>';
      html += '</div></div>';
    }
    html += '</div>';
    return html;
  }

  function cardWithDelta(label, value, cls){
    const colorCls = cls==='pos'?'mint':cls==='neg'?'red':'';
    return '<div class="card"><div class="label">'+label+'</div><div class="value '+colorCls+'">'+fmtSignedPct(value)+'</div></div>';
  }

  function safeId(s){ return String(s).replace(/[^a-z0-9]/gi,'_'); }
  function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function buildSummary(t){
    const parts = [];
    const nm = t.isGroup ? 'Across the group' : t.name;

    if (t.vsForecastPct!=null){
      if (t.vsForecastPct >= 2) parts.push(nm+' beat forecast by <b>'+fmtSignedPct(t.vsForecastPct)+'</b> ('+fmtMoney(t.sales)+' vs '+fmtMoney(t.forecast)+' forecast).');
      else if (t.vsForecastPct <= -2) parts.push(nm+' missed forecast by <b>'+fmtSignedPct(t.vsForecastPct)+'</b> ('+fmtMoney(t.sales)+' vs '+fmtMoney(t.forecast)+' forecast) &mdash; worth reviewing what drove the shortfall.');
      else parts.push(nm+' landed close to forecast ('+fmtMoney(t.sales)+' vs '+fmtMoney(t.forecast)+').');
    }
    if (t.vsPriorPct!=null && t.vsLYPct!=null){
      const trendWord = t.vsPriorPct >=0 ? 'up' : 'down';
      const lyWord = t.vsLYPct >=0 ? 'up' : 'down';
      parts.push('Sales were '+trendWord+' '+fmtPct(Math.abs(t.vsPriorPct))+' on the prior week and '+lyWord+' '+fmtPct(Math.abs(t.vsLYPct))+' versus the same week last year.');
    } else if (t.vsPriorPct!=null){
      parts.push('Sales were '+(t.vsPriorPct>=0?'up':'down')+' '+fmtPct(Math.abs(t.vsPriorPct))+' on the prior week.');
    }

    if (t.actualLaborPct!=null && t.target!=null){
      const diff = t.actualLaborPct - t.target;
      if (diff > 0.3) parts.push('Labour ran <b>'+diff.toFixed(1)+'pts above the '+t.target+'% target</b> ('+fmtPct(t.actualLaborPct)+' actual) &mdash; '+(t.fohPct>t.bohPct? 'FOH':'BOH')+' carried the larger share ('+fmtPct(t.fohPct)+' FOH / '+fmtPct(t.bohPct)+' BOH) and rotas should be tightened against trade next week.');
      else parts.push('Labour stayed at or under the '+t.target+'% target at '+fmtPct(t.actualLaborPct)+' ('+fmtPct(t.fohPct)+' FOH / '+fmtPct(t.bohPct)+' BOH).');
    } else if (t.actualLaborPct!=null && t.forecastLaborPct!=null){
      const diff = t.actualLaborPct - t.forecastLaborPct;
      if (diff > 0.5) parts.push('Labour ran <b>'+diff.toFixed(1)+'pts over plan</b> ('+fmtPct(t.actualLaborPct)+' actual vs '+fmtPct(t.forecastLaborPct)+' forecast) &mdash; '+(t.fohPct>t.bohPct? 'FOH':'BOH')+' carried the larger share ('+fmtPct(t.fohPct)+' FOH / '+fmtPct(t.bohPct)+' BOH) and rotas should be tightened against trade next week.');
      else if (diff < -0.5) parts.push('Labour ran under plan ('+fmtPct(t.actualLaborPct)+' actual vs '+fmtPct(t.forecastLaborPct)+' forecast), split '+fmtPct(t.fohPct)+' FOH / '+fmtPct(t.bohPct)+' BOH.');
      else parts.push('Labour ran to plan at '+fmtPct(t.actualLaborPct)+' ('+fmtPct(t.fohPct)+' FOH / '+fmtPct(t.bohPct)+' BOH).');
    }

    if (t.nextWeek && t.nextWeek.plannedLaborPct!=null && t.target!=null && t.nextWeek.plannedLaborPct > t.target + 0.3){
      parts.push('Next week\'s rota is currently planned <b>'+(t.nextWeek.plannedLaborPct-t.target).toFixed(1)+'pts above target</b> ('+fmtPct(t.nextWeek.plannedLaborPct)+' planned) &mdash; worth trimming hours against the forecast before the week starts.');
    }

    if (t.discountPct!=null){
      if (t.discountPct > 1.5) parts.push('Discounts &amp; comps reached <b>'+fmtPct(t.discountPct)+'</b> of revenue ('+fmtMoney(t.discounts)+') &mdash; managers should review the drivers, particularly complaint-led comps, with the team.');
      else parts.push('Discounts &amp; comps stayed contained at '+fmtPct(t.discountPct)+' of revenue.');
    }

    if (t.wastagePct!=null){
      if (t.wastagePct > 0.6) parts.push('Wastage was elevated at <b>'+fmtPct(t.wastagePct)+'</b> of revenue ('+fmtMoney(t.wastage)+') &mdash; a focus area for kitchen prep and stock control next week.');
      else parts.push('Wastage was under control at '+fmtPct(t.wastagePct)+' of revenue ('+fmtMoney(t.wastage)+').');
    }

    if (t.reviews){
      const negCount = (t.reviews.negative||[]).length;
      if (negCount > 0){
        parts.push('<b>'+negCount+' negative review'+(negCount===1?'':'s')+' (3&#9733; or below)</b> came in this week &mdash; worth a manager follow-up on the specific complaints raised.');
      }
      const g = t.reviews.Google, ft = t.reviews.Favouritetable;
      if (g && g.weekShiftPct!=null && g.weekShiftPct <= -3) parts.push('Google score shifted down '+fmtPct(Math.abs(g.weekShiftPct))+' this week.');
      if (g && g.mtdShiftPct!=null && g.mtdShiftPct <= -3) parts.push('Google score is trending down '+fmtPct(Math.abs(g.mtdShiftPct))+' month-to-date vs the same period last month.');
      if (ft && ft.avg!=null && ft.avg < 4.0) parts.push('Favouritetable rating sits at '+fmtRating(ft.avg)+', below the 4.0 watch line.');
    }

    if (!t.logs || !t.logs.length){
      parts.push((t.isGroup ? 'No sites logged a Weekly Site Report' : 'No Weekly Site Report was logged') +' this week &mdash; chase submission so revenue, labour and waste explanations are captured going forward.');
    }

    return parts.join(' ');
  }

  // Cell coloring reuses the same thresholds already used elsewhere on the dashboard: deltaClass
  // for vs Forecast/Prior/LY (matches the .delta.pos/.neg cards), ragClass vs each site's labour
  // target for all three Labour % columns (matches the per-site Labour cards), and the same 0.6%
  // "elevated" wastage line used in the summary narrative for Wastage %.
  function renderGroupTable(group, sites){
    const el = document.getElementById('group-table');
    if (!el || !window.gridjs) return;

    const pctColor = (cls) => cls==='pos' ? 'var(--mint)' : cls==='neg' ? 'var(--red)' : 'inherit';
    const deltaFormatter = (cell) => gridjs.html('<span style="color:'+pctColor(deltaClass(cell))+';">'+fmtSignedPct(cell)+'</span>');
    const laborFormatter = (cell) => {
      const cls = (cell.target!=null && cell.pct!=null) ? (cell.pct<=cell.target ? 'pos' : 'neg') : 'flat';
      const mark = (cell.mark && cell.target!=null) ? (cell.pct<=cell.target ? ' ✓' : ' ⚑') : '';
      return gridjs.html('<span style="color:'+pctColor(cls)+';">'+fmtPct(cell.pct)+mark+'</span>');
    };
    const wastageFormatter = (cell) => {
      const cls = cell!=null ? (cell>0.6 ? 'neg' : 'pos') : 'flat';
      return gridjs.html('<span style="color:'+pctColor(cls)+';">'+fmtPct(cell)+'</span>');
    };

    const rows = sites.map(s => [
      s.name,
      fmtMoney(s.sales), fmtMoney(s.forecast),
      s.vsForecastPct, s.vsPriorPct, s.vsLYPct,
      { pct: s.actualLaborPct, target: s.target, mark: true },
      { pct: s.currentWeek.plannedLaborPct, target: s.target },
      { pct: s.nextWeek.plannedLaborPct, target: s.target },
      s.wastagePct
    ]);
    new gridjs.Grid({
      columns: [
        'Site','Actual Rev','Forecast Rev',
        { name:'vs Forecast', formatter: deltaFormatter },
        { name:'vs Prior Wk', formatter: deltaFormatter },
        { name:'vs LY', formatter: deltaFormatter },
        { name:'Labour % (Actual)', formatter: laborFormatter, sort:false },
        { name:'This Wk Labour % (Plan)', formatter: laborFormatter, sort:false },
        { name:'Next Wk Labour % (Plan)', formatter: laborFormatter, sort:false },
        { name:'Wastage %', formatter: wastageFormatter }
      ],
      data: rows,
      sort:true,
      search:true,
      className: { table:'gh-grid' },
      style: {
        table: { 'font-family':'inherit', 'font-size':'12px', background:'#161616', color:'#f4f4f4' },
        th: { background:'#1e1e1e', color:'#9c9c9c', 'border':'1px solid #2b2b2b' },
        td: { background:'#161616', 'border':'1px solid #1c1c1c' }
      }
    }).render(el);
  }

  function renderDiscountTable(t){
    const el = document.getElementById('discount-table-'+safeId(t.name));
    if (!el || !window.gridjs) return;
    const rows = Object.entries(t.discountSplit.types).sort((a,b)=>b[1]-a[1]).map(([k,v]) => [k, fmtMoney(v), classifyDiscount(k)==='comp'?'Comp/Complaint':'Discount']);
    new gridjs.Grid({
      columns: ['Type','Amount','Category'],
      data: rows,
      sort:true,
      style: {
        table: { 'font-family':'inherit', 'font-size':'12px', background:'#161616', color:'#f4f4f4' },
        th: { background:'#1e1e1e', color:'#9c9c9c', border:'1px solid #2b2b2b' },
        td: { background:'#161616', border:'1px solid #1c1c1c' }
      }
    }).render(el);
  }

  function initTablesFor(idx, allTabs){
    const t = allTabs[idx];
    if (!t) return;

    if (t.isGroup){
      const tableEl = document.getElementById('group-table');
      if (tableEl && !tableEl.dataset.rendered){ tableEl.dataset.rendered='1'; renderGroupTable(t, t.siteRows); }
    } else if (t.isOverview){
      // Year To Dates is plain card HTML (see renderOverviewPanel) — no lazy table to init.
    } else {
      const discEl = document.getElementById('discount-table-'+safeId(t.name));
      if (discEl && !discEl.dataset.rendered){ discEl.dataset.rendered='1'; renderDiscountTable(t); }
    }
  }

  loadDashboard();

})();
</script>
</body>
